<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>GymRock · Suscripciones</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0D0D1A;--card:rgba(255,255,255,0.03);--side:#111128;--border:rgba(255,255,255,0.06);--white:#F0F0F5;--gray:#8A8AA8;--gold:#D4AF37;--red:#DC2626;--green:#22C55E}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);display:flex}.sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:24px 16px;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column}.sidebar .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}.sidebar .logo span{font-size:20px;font-weight:800}.sidebar .logo span span{color:var(--gold)}.sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1}.sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;color:var(--gray);text-decoration:none;font-size:14px;font-weight:500}.sidebar nav a:hover{background:rgba(212,175,55,0.06);color:var(--white)}.sidebar nav a.active{background:rgba(212,175,55,0.08);color:var(--gold);border-left:3px solid var(--gold)}.sidebar nav a.logout{margin-top:auto;color:var(--red);border-top:1px solid var(--border);padding-top:16px}.main{margin-left:260px;flex:1;padding:24px 32px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.header h1{font-size:24px}.header p{color:var(--gray)}.user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}.user .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#B8941E);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D0D1A}.empty{text-align:center;padding:80px 20px;background:var(--card);border:1px solid var(--border);border-radius:16px}.empty .icon{font-size:64px;display:block;margin-bottom:20px}.empty h2{font-size:22px;margin-bottom:8px}.empty p{color:var(--gray);margin-bottom:20px}.btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,var(--gold),#B8941E);border:none;border-radius:10px;color:#0D0D1A;font-weight:700;text-decoration:none;cursor:pointer}@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:16px}}</style></head><body><aside class="sidebar"><div class="logo"><span>GYM<span>ROCK</span></span></div><nav><a href="gimnasios.html"><i class="fas fa-dumbbell"></i> Gimnasios</a><a href="#" class="active"><i class="fas fa-receipt"></i> Suscripciones</a><a href="extras.html"><i class="fas fa-gem"></i> Extras</a><a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a></nav></aside><main class="main"><div class="header"><div><h1><i class="fas fa-receipt" style="color:var(--gold)"></i> Mis Suscripciones</h1><p>Gestiona tus membresias</p></div><div class="user"><div class="avatar" id="ua">CL</div><div class="info" id="ui">Cliente</div></div></div><div class="empty"><span class="icon">📋</span><h2>Aun no tienes suscripciones</h2><p>Explora los gimnasios disponibles</p><a href="gimnasios.html" class="btn"><i class="fas fa-search"></i> Explorar Gimnasios</a></div></main><script>function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='cliente'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').textContent=u.nombre;document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}});</script></body></html>
