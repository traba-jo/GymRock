<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Suscripciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#0a0a10;--side:#0f0f18;--card:#14141e;--text:#e8e8f0;--sub:#8888a0;
            --cyan:#00e5ff;--green:#00e676;--purple:#b388ff;--border:#1e1e2e;--hover:#1a1a28;--red:#ff5252;
            --gradient:linear-gradient(135deg,#00e5ff,#b388ff);
        }
        [data-theme="light"] {
            --bg:#f5f5fa;--side:#ffffff;--card:#ffffff;--text:#1a1a2e;--sub:#6b6b80;
            --cyan:#0091ea;--green:#00c853;--purple:#651fff;--border:#e0e0ee;--hover:#f0f0f8;--red:#d32f2f;
            --gradient:linear-gradient(135deg,#0091ea,#651fff);
        }
        *{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s,border-color 0.3s,color 0.2s}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
        
        .sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:28px 20px;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform 0.3s}
        .sidebar .logo{text-align:center;margin-bottom:32px}
        .sidebar .logo img{max-width:110px;height:auto;filter:drop-shadow(0 0 20px rgba(0,229,255,0.2))}
        .sidebar nav{display:flex;flex-direction:column;gap:6px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;color:var(--sub);text-decoration:none;font-size:13px;font-weight:500;position:relative;overflow:hidden}
        .sidebar nav a::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform 0.3s}
        .sidebar nav a i{width:20px;text-align:center;font-size:16px}
        .sidebar nav a:hover{background:var(--hover);color:var(--text)}
        .sidebar nav a:hover::before{transform:scaleY(1)}
        .sidebar nav a.active{background:rgba(0,229,255,0.06);color:var(--cyan)}
        .sidebar nav a.active::before{transform:scaleY(1)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red)}
        
        .main{flex:1;margin-left:260px;padding:28px 36px;overflow-y:auto;height:100vh}
        .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-bottom:24px}
        .pill{display:flex;gap:2px;background:var(--side);border:1px solid var(--border);border-radius:10px;padding:3px}
        .pill-btn{padding:7px 12px;border:none;background:none;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif}
        .pill-btn.active{background:var(--gradient);color:#fff}
        .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--side);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}
        .theme-btn:hover{border-color:var(--cyan)}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .header h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px}
        .header h1 span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
        .user .name{font-size:12px;font-weight:600}.user .name small{display:block;color:var(--sub);font-size:10px;font-weight:400}
        
        .empty{text-align:center;padding:80px 40px;background:var(--card);border:1px solid var(--border);border-radius:20px;position:relative;overflow:hidden}
        .empty::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient)}
        .empty .icon{font-size:72px;display:block;margin-bottom:24px;opacity:0.1}
        .empty h2{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px}
        .empty p{color:var(--sub);font-size:14px;margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto}
        .empty .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:var(--gradient);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;letter-spacing:0.3px}
        .empty .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,229,255,0.2)}
        
        .hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;position:fixed;top:20px;left:20px;z-index:60}
        @media(max-width:768px){.hamburger{display:block}.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}.empty{padding:40px 20px}}
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"></div>
        <nav>
            <a href="gimnasios.html"><i class="fas fa-dumbbell"></i> <span data-es="Gimnasios" data-en="Gyms">Gimnasios</span></a>
            <a href="#" class="active"><i class="fas fa-receipt"></i> <span data-es="Suscripciones" data-en="Subscriptions">Suscripciones</span></a>
            <a href="entrenadores.html"><i class="fas fa-user-graduate"></i> <span data-es="Entrenadores" data-en="Trainers">Entrenadores</span></a>
            <a href="extras.html"><i class="fas fa-gem"></i> <span data-es="Extras" data-en="Extras">Extras</span></a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> <span data-es="Salir" data-en="Logout">Salir</span></a>
        </nav>
    </aside>
    <main class="main">
        <div class="top-bar">
            <div class="pill">
                <button class="pill-btn active" onclick="setLang('es',this)">ES</button>
                <button class="pill-btn" onclick="setLang('en',this)">EN</button>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="header">
            <div><h1><span>Mis</span> Suscripciones</h1><p style="color:var(--sub);font-size:13px;margin-top:4px" data-es="Tus membresías activas" data-en="Your active memberships">Tus membresías activas</p></div>
            <div class="user"><div class="avatar" id="ua">CL</div><div class="name" id="ui">Cargando...</div></div>
        </div>
        <div class="empty">
            <span class="icon">📋</span>
            <h2 data-es="Aún no tienes suscripciones" data-en="No subscriptions yet">Aún no tienes suscripciones</h2>
            <p data-es="Encuentra tu gimnasio ideal y comienza a entrenar hoy mismo." data-en="Find your ideal gym and start training today.">Encuentra tu gimnasio ideal y comienza a entrenar hoy mismo.</p>
            <a href="gimnasios.html" class="btn"><i class="fas fa-search"></i> <span data-es="Explorar Gimnasios" data-en="Explore Gyms">Explorar Gimnasios</span></a>
        </div>
    </main>
    <script>
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        function toggleTheme(){const h=document.documentElement;const t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t)}
        (function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
        
        function setLang(lang,btn){
            document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('[data-es][data-en]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));
            localStorage.setItem('lang',lang);
        }
        (function(){const l=localStorage.getItem('lang')||'es';const b=document.querySelector('.pill-btn[onclick*="'+l+'"]');if(b)setLang(l,b)})();
        
        document.addEventListener('DOMContentLoaded',()=>{
            const t=localStorage.getItem('gymrock_token');
            if(!t||localStorage.getItem('gymrock_rol')!=='cliente'){window.location.href='index.html';return}
            const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');
            if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small>Cliente</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}
        });
    </script>
</body>
</html>
