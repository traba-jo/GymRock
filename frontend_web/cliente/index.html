<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0D0D1A;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.06);
            --text-white: #F0F0F5;
            --text-gray: #8A8AA8;
            --text-muted: #5A5A7A;
            --oro: #D4AF37;
            --oro-suave: #E8D5A3;
            --marfil: #F5F0E8;
            --negro-elegante: #1A1A2E;
            --shadow-glow: 0 25px 60px rgba(212, 175, 55, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: float 30s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--oro);
            top: -200px;
            right: -100px;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--marfil);
            bottom: -150px;
            left: -100px;
            animation-delay: -10s;
        }
        .orb-3 {
            width: 300px;
            height: 300px;
            background: var(--oro-suave);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -20s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 40px) scale(0.95); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--shadow-glow);
            animation: slideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--oro), var(--oro-suave), var(--oro), transparent);
            background-size: 300% 100%;
            animation: shimmer 6s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0%; }
            100% { background-position: 200% 0%; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            background: rgba(212, 175, 55, 0.04);
            padding: 5px 14px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.06);
            margin-bottom: 20px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--oro);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .logo {
            width: 100%;
            max-width: 280px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.15));
            animation: logo-glow 4s ease-in-out infinite;
        }

        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.1)); }
            50% { filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.2)); }
        }

        .brand h1 {
            display: none; /* Oculto porque el logo ya tiene el nombre */
        }

        .brand .subtitle {
            font-size: 13px;
            color: var(--text-gray);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .brand .subtitle i {
            margin-right: 6px;
            color: var(--oro);
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-gray);
            letter-spacing: 0.3px;
        }

        .input-group label i {
            margin-right: 6px;
            color: var(--oro);
            width: 16px;
        }

        .input-group input,
        .input-group select {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.12);
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--oro);
            background: rgba(212, 175, 55, 0.03);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.03);
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
            color: var(--text-white);
        }

        .input-group select option {
            background: #0D0D1A;
            color: var(--text-white);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 44px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.3s ease;
            padding: 4px;
        }

        .toggle-password:hover {
            opacity: 0.7;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px;
            background: linear-gradient(135deg, var(--negro-elegante), #2A2A4A);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--oro), var(--oro-suave));
            opacity: 0;
            transition: all 0.5s ease;
        }

        .btn-primary:hover::before {
            opacity: 0.08;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            border-color: var(--oro);
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.06);
        }

        .btn-primary i {
            position: relative;
            z-index: 1;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover i {
            transform: translateX(3px);
        }

        .btn-primary span {
            position: relative;
            z-index: 1;
        }

        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .links a {
            font-size: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .link-primary {
            color: var(--oro);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .link-primary:hover {
            color: var(--oro-suave);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .link-secondary {
            color: rgba(255, 255, 255, 0.15);
        }

        .link-secondary:hover {
            color: var(--text-gray);
        }

        .mensaje {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            text-align: center;
        }

        .mensaje.success {
            display: block;
            background: rgba(212, 175, 55, 0.06);
            color: var(--oro);
            border: 1px solid rgba(212, 175, 55, 0.08);
        }

        .mensaje.error {
            display: block;
            background: rgba(239, 68, 68, 0.04);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.06);
        }

        .mensaje.loading {
            display: block;
            background: rgba(212, 175, 55, 0.04);
            color: var(--oro-suave);
            border: 1px solid rgba(212, 175, 55, 0.06);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card.hidden {
            display: none;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 640px) {
            .card {
                padding: 30px 20px;
            }
            
            .logo {
                max-width: 220px;
            }
            
            .brand .subtitle {
                font-size: 12px;
            }
            
            .row-2 {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .links {
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- ======================================== -->
        <!-- LOGIN DEL CLIENTE                       -->
        <!-- ======================================== -->
        <div class="card" id="loginCard">
            <div class="live-badge">
                <span class="dot"></span> Cliente · Área Personal
            </div>

            <div class="brand">
                <div class="logo-wrapper">
                    <img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" 
                         alt="GymRock" 
                         class="logo"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%2290%22 font-size=%2290%22%3E🏋️%3C/text%3E%3C/svg%3E'">
                </div>
                <p class="subtitle"><i class="fas fa-user"></i> Área de Clientes</p>
            </div>

            <form id="loginForm" class="form">
                <div class="input-group">
                    <label for="email"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span>Ingresar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="links">
                <a href="#" id="btnMostrarRegistro" class="link-primary">
                    <i class="fas fa-user-plus"></i> Crear cuenta
                </a>
                <a href="../index.html" class="link-secondary">
                    <i class="fas fa-home"></i> Volver al inicio
                </a>
            </div>

            <div id="mensaje" class="mensaje"></div>
        </div>

        <!-- ======================================== -->
        <!-- REGISTRO DEL CLIENTE                     -->
        <!-- ======================================== -->
        <div class="card hidden" id="registroCard">
            <div class="brand">
                <h2 style="color: var(--text-white); font-size: 22px;">📋 Crear Cuenta</h2>
                <p class="subtitle"><i class="fas fa-rocket"></i> Únete a GymRock en 1 minuto</p>
            </div>

            <form id="registerForm" class="form">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nombre Completo</label>
                    <input type="text" id="reg_nombre" placeholder="Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="reg_email" placeholder="juan@ejemplo.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="reg_password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="row-2">
                    <div class="input-group">
                        <label><i class="fas fa-map-marker-alt"></i> Estado</label>
                        <input type="text" id="reg_estado" placeholder="CDMX" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-map-pin"></i> Municipio</label>
                        <input type="text" id="reg_municipio" placeholder="Benito Juárez" required>
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="text" id="reg_telefono" placeholder="5512345678">
                </div>
                <button type="submit" class="btn-primary">
                    <span>Registrarme</span>
                    <i class="fas fa-guitar"></i>
                </button>
            </form>

            <div class="links">
                <a href="#" id="btnMostrarLogin" class="link-primary">
                    <i class="fas fa-arrow-left"></i> Volver al login
                </a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // GYMROCK · SCRIPT CLIENTE (TODO EN UNO)
        // ============================================

        const API_URL = 'http://192.168.101.9:5000'; // 🔴 CAMBIA POR TU IP

        document.getElementById('btnMostrarRegistro').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('registroCard').classList.remove('hidden');
        });

        document.getElementById('btnMostrarLogin').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('registroCard').classList.add('hidden');
            document.getElementById('loginCard').classList.remove('hidden');
        });

        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        function mostrarMensaje(id, tipo, texto) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = texto;
            el.className = 'mensaje ' + tipo;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            mostrarMensaje('mensaje', 'loading', '⏳ Conectando con GymRock...');

            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, rol: 'cliente' })
                });
                const data = await res.json();

                if (res.status === 200 && data.status === 'success') {
                    localStorage.setItem('gymrock_token', data.data.token);
                    localStorage.setItem('gymrock_rol', 'cliente');
                    mostrarMensaje('mensaje', 'success', '✅ ¡Bienvenido ' + data.data.nombre + '!');
                    setTimeout(() => {
                        window.location.href = 'gimnasios.html';
                    }, 1500);
                } else {
                    mostrarMensaje('mensaje', 'error', '❌ ' + (data.error || 'Credenciales incorrectas'));
                }
            } catch (error) {
                mostrarMensaje('mensaje', 'error', '❌ Error de red: ' + error.message);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('reg_nombre').value,
                email: document.getElementById('reg_email').value,
                password: document.getElementById('reg_password').value,
                estado: document.getElementById('reg_estado').value,
                municipio: document.getElementById('reg_municipio').value,
                telefono: document.getElementById('reg_telefono').value || ''
            };

            mostrarMensaje('mensaje', 'loading', '⏳ Creando tu cuenta...');

            try {
                const res = await fetch(`${API_URL}/api/registro/cliente`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.status === 201 && result.status === 'success') {
                    localStorage.setItem('gymrock_token', result.data.token);
                    localStorage.setItem('gymrock_rol', 'cliente');
                    mostrarMensaje('mensaje', 'success', '✅ ¡Registro exitoso! Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = 'gimnasios.html';
                    }, 2000);
                } else {
                    mostrarMensaje('mensaje', 'error', '❌ ' + (result.error || 'Error al registrar'));
                }
            } catch (error) {
                mostrarMensaje('mensaje', 'error', '❌ Error de red: ' + error.message);
            }
        });

        console.log('💪 GymRock - Panel del Cliente cargado');
        console.log('📡 API URL:', API_URL);
    </script>
</body>
</html>
