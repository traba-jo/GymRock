<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Gimnasios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ============================================
           GYMROCK · CLIENTE · GIMNASIOS (Elegante)
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0D0D1A;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-sidebar: #111128;
            --border-glass: rgba(255, 255, 255, 0.06);
            --text-white: #F0F0F5;
            --text-gray: #8A8AA8;
            --text-muted: #5A5A7A;
            --oro: #D4AF37;
            --oro-suave: #E8D5A3;
            --marfil: #F5F0E8;
            --negro-elegante: #1A1A2E;
            --verde: #22C55E;
            --shadow-glow: 0 25px 60px rgba(212, 175, 55, 0.06);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
        }

        .sidebar .logo-wrapper img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }

        .sidebar .logo-wrapper span {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-white);
        }

        .sidebar .logo-wrapper span span {
            color: var(--oro);
        }

        .sidebar .nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sidebar .nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .sidebar .nav a i {
            width: 20px;
            font-size: 16px;
            transition: var(--transition);
        }

        .sidebar .nav a:hover {
            background: rgba(212, 175, 55, 0.06);
            color: var(--text-white);
        }

        .sidebar .nav a:hover i {
            color: var(--oro);
        }

        .sidebar .nav a.active {
            background: rgba(212, 175, 55, 0.08);
            color: var(--oro);
            border-left: 3px solid var(--oro);
        }

        .sidebar .nav a.active i {
            color: var(--oro);
        }

        .sidebar .nav a.logout {
            margin-top: auto;
            color: #DC2626;
            border-top: 1px solid var(--border-glass);
            padding-top: 16px;
        }

        .sidebar .nav a.logout:hover {
            background: rgba(220, 38, 38, 0.06);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            height: 100vh;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .greeting h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .greeting h1 i {
            color: var(--oro);
        }

        .header .greeting p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .header .user {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            padding: 8px 16px 8px 12px;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .header .user .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--oro), #B8941E);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #0D0D1A;
        }

        .header .user .info {
            font-size: 13px;
            font-weight: 500;
        }

        .header .user .info small {
            display: block;
            font-weight: 400;
            color: var(--text-gray);
            font-size: 11px;
        }

        /* ============================================
           CONTROLES
           ============================================ */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .controls .search {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 10px 16px;
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            transition: var(--transition);
        }

        .controls .search:focus-within {
            border-color: var(--oro);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.06);
        }

        .controls .search i {
            color: var(--text-muted);
            font-size: 14px;
        }

        .controls .search input {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
        }

        .controls .search input::placeholder {
            color: var(--text-muted);
        }

        .controls .filtro-ubicacion {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls .filtro-ubicacion select {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .controls .filtro-ubicacion select:focus {
            border-color: var(--oro);
        }

        .controls .filtro-ubicacion select option {
            background: var(--bg-primary);
            color: var(--text-white);
        }

        /* ============================================
           GIMNASIOS GRID
           ============================================ */
        .gym-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .gym-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .gym-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--oro), var(--oro-suave));
            opacity: 0;
            transition: var(--transition);
        }

        .gym-card:hover {
            border-color: var(--oro);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.04);
        }

        .gym-card:hover::before {
            opacity: 1;
        }

        .gym-card .gym-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .gym-card .gym-header .gym-name {
            font-size: 18px;
            font-weight: 700;
        }

        .gym-card .gym-header .gym-name i {
            color: var(--oro);
            margin-right: 8px;
            font-size: 16px;
        }

        .gym-card .gym-header .distancia {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-gray);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .gym-card .gym-header .distancia i {
            color: var(--oro);
        }

        .gym-card .gym-dir {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 12px;
        }

        .gym-card .gym-dir i {
            margin-right: 6px;
            color: var(--text-muted);
            width: 16px;
        }

        .gym-card .gym-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .gym-card .gym-stats .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .gym-card .gym-stats .stat i {
            color: var(--oro);
            font-size: 14px;
        }

        .gym-card .gym-stats .stat .num {
            font-weight: 600;
            color: var(--text-white);
        }

        .gym-card .gym-trainers {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid var(--border-glass);
        }

        .gym-card .gym-trainers .trainer-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50px;
            color: var(--text-gray);
        }

        .gym-card .gym-trainers .trainer-tag .cert {
            color: var(--oro);
            font-size: 11px;
        }

        .gym-card .gym-precios {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .gym-card .gym-precios .precio {
            font-size: 13px;
            color: var(--text-gray);
        }

        .gym-card .gym-precios .precio strong {
            color: var(--text-white);
            font-size: 16px;
        }

        .gym-card .gym-precios .precio .moneda {
            color: var(--oro);
            font-weight: 600;
        }

        .gym-card .gym-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .btn-suscribir {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, var(--oro), #B8941E);
            border: none;
            border-radius: 10px;
            color: #0D0D1A;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-suscribir:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
        }

        .btn-ver {
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-ver:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-white);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 16px;
            }

            .gym-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls .search {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header .greeting h1 {
                font-size: 20px;
            }

            .gym-card {
                padding: 18px 16px;
            }

            .gym-card .gym-stats {
                gap: 12px;
            }

            .gym-card .gym-actions {
                flex-direction: column;
            }

            .btn-ver {
                text-align: center;
            }
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
        }

        .mensaje-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-white);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-glow);
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .mensaje-toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .mensaje-toast.success {
            border-color: var(--verde);
        }

        .mensaje-toast.error {
            border-color: #DC2626;
        }

        .mensaje-toast i {
            margin-right: 8px;
        }
    </style>
</head>

    <script>
        // ============================================
        // GYMROCK · CLIENTE · GIMNASIOS SCRIPT
        // ============================================

        const API_URL = 'http://192.168.101.9:5000'; // 🔴 CAMBIA POR TU IP

        // --- DATOS DE EJEMPLO (luego se conectará con la API) ---
        let gimnasios = [
            {

                ],

                visible: true
            },
            {

                estado: 'CDMX',
                municipio: 'Miguel Hidalgo',
                distancia: '3.5 km',
                telefono: '+52 55 2345 6789',
                planes: [
                    { tipo: 'Mensual', precio: 550 },
                    { tipo: 'Quincenal', precio: 300 },
                    { tipo: 'Anual', precio: 5000 }
                ],
                entrenadores: [
                    { nombre: 'Patricia G.', certificado: true },
                    { nombre: 'Roberto M.', certificado: true },
                    { nombre: 'Sofía R.', certificado: true },
                    { nombre: 'Diego H.', certificado: false }
                ],
                total_entrenadores: 4,
                certificados: 3,
                calificacion: 4.8,
                visible: true
            },
            {
                id: 4,
                nombre: 'Iron House Gym',
                direccion: 'Av. Vallarta 234, Guadalajara',
                estado: 'Jalisco',
                municipio: 'Guadalajara',
                distancia: 'N/A',
                telefono: '+52 33 3456 7890',
                planes: [
                    { tipo: 'Mensual', precio: 320 },
                    { tipo: 'Quincenal', precio: 180 }
                ],
                entrenadores: [
                    { nombre: 'Javier O.', certificado: false },
                    { nombre: 'Carmen V.', certificado: true }
                ],
                total_entrenadores: 2,
                certificados: 1,
                calificacion: 4.0,
                visible: true
            }
        ];

        // --- RENDERIZAR GIMNASIOS ---
        function renderizarGimnasios() {
            const grid = document.getElementById('gymGrid');
            const busqueda = document.getElementById('buscarGym').value.toLowerCase().trim();
            const municipioFiltro = document.getElementById('filtroMunicipio').value;

            let filtrados = gimnasios.filter(g => g.visible);

            // Filtro por búsqueda
            if (busqueda) {
                filtrados = filtrados.filter(g =>
                    g.nombre.toLowerCase().includes(busqueda) ||
                    g.direccion.toLowerCase().includes(busqueda) ||
                    g.municipio.toLowerCase().includes(busqueda)
                );
            }

            // Filtro por municipio
            if (municipioFiltro !== 'todos') {
                filtrados = filtrados.filter(g =>
                    g.municipio.toLowerCase().replace(/\s/g, '-') === municipioFiltro
                );
            }

            if (filtrados.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-gray);">
                        <i class="fas fa-search" style="font-size: 48px; opacity: 0.2; display: block; margin-bottom: 16px;"></i>
                        <p style="font-size: 18px; font-weight: 600; color: var(--text-white);">No hay gimnasios</p>
                        <p style="font-size: 14px;">No encontramos gimnasios que coincidan con tu búsqueda.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtrados.map(g => {
                const planesHTML = g.planes.map(p =>
                    `<span class="precio"><strong>$${p.precio}</strong> <span class="moneda">MXN</span> / ${p.tipo}</span>`
                ).join('');

                const entrenadoresHTML = g.entrenadores.slice(0, 3).map(e =>
                    `<span class="trainer-tag">
                        ${e.nombre}
                        ${e.certificado ? '<span class="cert"><i class="fas fa-certificate"></i></span>' : ''}
                    </span>`
                ).join('');

                const entrenadoresExtra = g.entrenadores.length > 3 ?
                    `<span class="trainer-tag">+${g.entrenadores.length - 3} más</span>` : '';

                const estrellas = '★'.repeat(Math.floor(g.calificacion)) + '☆'.repeat(5 - Math.floor(g.calificacion));

                return `
                    <div class="gym-card">
                        <div class="gym-header">
                            <div class="gym-name">
                                <i class="fas fa-dumbbell"></i> ${g.nombre}
                            </div>
                            <div class="distancia">
                                <i class="fas fa-location-dot"></i> ${g.distancia}
                            </div>
                        </div>
                        <div class="gym-dir">
                            <i class="fas fa-map-pin"></i> ${g.direccion}
                        </div>
                        <div class="gym-stats">
                            <span class="stat">
                                <i class="fas fa-star" style="color: var(--oro);"></i>
                                <span class="num">${g.calificacion}</span> (${estrellas})
                            </span>
                            <span class="stat">
                                <i class="fas fa-users"></i>
                                <span class="num">${g.total_entrenadores}</span> entrenadores
                            </span>
                            <span class="stat">
                                <i class="fas fa-certificate" style="color: var(--oro);"></i>
                                <span class="num">${g.certificados}</span> C.C.
                            </span>
                        </div>
                        <div class="gym-trainers">
                            ${entrenadoresHTML}
                            ${entrenadoresExtra}
                        </div>
                        <div class="gym-precios">
                            ${planesHTML}
                        </div>
                        <div class="gym-actions">
                            <button class="btn-suscribir" onclick="suscribirse(${g.id})">
                                <i class="fas fa-check-circle"></i> Suscribirse
                            </button>
                            <button class="btn-ver" onclick="verGimnasio(${g.id})">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ACCIONES ---
        function suscribirse(id) {
            mostrarToast('📋 Redirigiendo a suscripción...', 'success');
            setTimeout(() => {
                window.location.href = 'suscripciones.html';
            }, 800);
        }

        function verGimnasio(id) {
            mostrarToast('👁️ Cargando detalles del gimnasio...', 'success');
            // Aquí se abriría un modal o se redirigiría a detalles
            console.log('Ver gimnasio ID:', id);
        }

        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.className = 'mensaje-toast ' + tipo + ' show';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- TOGGLE SIDEBAR (móvil) ---
        document.getElementById('hamburgerBtn')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.getElementById('hamburgerBtn');
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        // --- EVENTOS ---
        document.getElementById('buscarGym').addEventListener('input', renderizarGimnasios);
        document.getElementById('filtroMunicipio').addEventListener('change', renderizarGimnasios);

        // --- INICIAR ---
        document.addEventListener('DOMContentLoaded', function() {
            renderizarGimnasios();

            // Verificar token
            const token = localStorage.getItem('gymrock_token');
            if (!token) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
