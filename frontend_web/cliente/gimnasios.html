<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Gimnasios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#06060E;--side:#0A0A14;--card:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.04);--white:#EDEDF5;--gray:#8888A0;--cyan:#06b6d4;--purple:#8b5cf6;--gold:#f59e0b;--red:#ef4444;--green:#22c55e}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);display:flex;min-height:100vh}
        
        .sidebar{width:270px;background:var(--side);border-right:1px solid var(--border);padding:28px 20px;position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column}
        .sidebar .logo{font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border)}
        .sidebar .logo span{background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sidebar nav{display:flex;flex-direction:column;gap:6px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:12px;color:var(--gray);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s}
        .sidebar nav a i{width:20px;font-size:16px;text-align:center}
        .sidebar nav a:hover{background:rgba(139,92,246,0.06);color:var(--white)}
        .sidebar nav a.active{background:linear-gradient(135deg,rgba(6,182,212,0.12),rgba(139,92,246,0.08));color:var(--white);border:1px solid rgba(6,182,212,0.15)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red);border-top:1px solid var(--border);padding-top:20px;margin-top:20px}
        
        .main{margin-left:270px;flex:1;padding:32px 40px;overflow-y:auto;height:100vh}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px}
        .header h1{font-size:28px;font-weight:800;letter-spacing:-0.5px}
        .header h1 i{color:var(--cyan)}
        .header .user{display:flex;align-items:center;gap:14px;background:var(--card);padding:8px 18px;border-radius:50px;border:1px solid var(--border)}
        .header .user .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
        .header .user .info{font-size:13px;font-weight:600}.header .user .info small{display:block;color:var(--gray);font-size:11px;font-weight:400}
        
        .search-bar{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:28px;transition:all 0.3s}
        .search-bar:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,0.06)}
        .search-bar i{color:var(--gray);font-size:16px}
        .search-bar input{background:none;border:none;color:var(--white);font-size:15px;outline:none;width:100%}
        .search-bar input::placeholder{color:var(--gray)}
        
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;transition:all 0.3s;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));opacity:0;transition:opacity 0.3s}
        .card:hover{border-color:rgba(6,182,212,0.2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
        .card:hover::before{opacity:1}
        .card .badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 14px;border-radius:50px;background:rgba(6,182,212,0.1);color:var(--cyan);margin-bottom:16px}
        .card h3{font-size:20px;font-weight:700;margin-bottom:8px}
        .card .location{color:var(--gray);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
        .card .details{display:flex;gap:20px;margin-bottom:20px;font-size:13px;color:var(--gray)}
        .card .details span{display:flex;align-items:center;gap:6px}
        .card .details i{color:var(--purple)}
        .card .price{font-size:24px;font-weight:800;color:var(--white);margin-bottom:16px}
        .card .price small{font-size:13px;color:var(--gray);font-weight:400}
        .card button{width:100%;padding:13px;background:linear-gradient(135deg,var(--cyan),#0ea5e9);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s}
        .card button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(6,182,212,0.3)}
        
        .empty-state{text-align:center;padding:80px 20px;grid-column:1/-1}
        .empty-state .icon{font-size:64px;display:block;margin-bottom:20px;opacity:0.3}
        .empty-state h2{font-size:22px;margin-bottom:8px}
        .empty-state p{color:var(--gray)}
        
        @media(max-width:768px){.sidebar{transform:translateX(-100%);width:280px}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}.grid{grid-template-columns:1fr}.header h1{font-size:22px}}
        .hamburger{display:none;background:none;border:none;color:var(--white);font-size:24px;cursor:pointer}@media(max-width:768px){.hamburger{display:block}}
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="logo"><span>GYMROCK</span></div>
        <nav>
            <a href="#" class="active"><i class="fas fa-dumbbell"></i> Gimnasios</a>
            <a href="suscripciones.html"><i class="fas fa-receipt"></i> Mis Suscripciones</a>
            <a href="extras.html"><i class="fas fa-gem"></i> Extras</a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar sesion</a>
        </nav>
    </aside>
    <main class="main">
        <div class="header">
            <div style="display:flex;align-items:center;gap:14px">
                <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
                <div><h1><i class="fas fa-dumbbell"></i> Gimnasios</h1><p style="color:var(--gray);font-size:14px">Encuentra tu lugar ideal para entrenar</p></div>
            </div>
            <div class="user"><div class="avatar" id="ua">CL</div><div class="info" id="ui">Cargando...</div></div>
        </div>
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="buscar" placeholder="Buscar por nombre, estado o municipio..."></div>
        <div class="grid" id="grid"><div class="empty-state"><i class="fas fa-spinner fa-spin icon"></i><p>Cargando gimnasios...</p></div></div>
    </main>
    <script>
        const API=window.location.origin;let gimnasios=[];
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        async function cargar(){try{const r=await fetch(API+'/api/gimnasios');const d=await r.json();if(d.status==='success'){gimnasios=d.data||[];render()}}catch(e){document.getElementById('grid').innerHTML='<div class="empty-state"><i class="fas fa-plug icon"></i><h2>Error de conexion</h2><button onclick="cargar()" style="margin-top:16px;padding:10px 24px;background:var(--cyan);border:none;border-radius:10px;color:#fff;cursor:pointer;font-weight:600">Reintentar</button></div>'}}
        function render(){const g=document.getElementById('grid'),b=document.getElementById('buscar').value.toLowerCase();let f=gimnasios;if(b)f=gimnasios.filter(x=>(x.nombre||'').toLowerCase().includes(b)||(x.estado||'').toLowerCase().includes(b)||(x.municipio||'').toLowerCase().includes(b));if(!f.length){g.innerHTML='<div class="empty-state"><i class="fas fa-dumbbell icon"></i><h2>No hay gimnasios disponibles</h2><p>'+ (b?'Intenta otra busqueda':'Se el primero en registrarte')+'</p></div>';return}
        g.innerHTML=f.map(x=>{const p=x.plan||'basico',pr=p==='basico'?500:p==='pro'?800:1200;return'<div class="card"><span class="badge">'+p.toUpperCase()+'</span><h3>'+x.nombre+'</h3><div class="location"><i class="fas fa-map-pin"></i> '+(x.estado||'')+', '+(x.municipio||'')+'</div><div class="details"><span><i class="fas fa-phone"></i> '+(x.telefono||'N/A')+'</span></div><div class="price">$'+pr+'<small>/mes</small></div><button onclick="pagar(\''+x.id+'\')"><i class="fas fa-credit-card"></i> Suscribirse</button></div>'}).join('')}
        function pagar(id){const x=gimnasios.find(g=>g.id===id);if(!x)return;const p=x.plan||'basico',pr=p==='basico'?500:p==='pro'?800:1200;window.location.href='pago.html?gym='+id+'&plan='+p+'&precio='+pr+'&nombre='+encodeURIComponent(x.nombre||'Gimnasio')}
        document.getElementById('buscar').addEventListener('input',render);
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='cliente'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small>Cliente</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}cargar()});
    </script>
</body>
</html>
