<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Gimnasios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#0f0f13;--side:#18181d;--card:#1c1c22;--text:#e4e4e8;--sub:#9898a8;
            --cyan:#22d3ee;--green:#34d399;--purple:#a78bfa;--border:#27272d;--hover:#22222a;--red:#f87171;
        }
        [data-theme="light"] {
            --bg:#f8f9fc;--side:#ffffff;--card:#ffffff;--text:#1a1a2e;--sub:#6b7280;
            --cyan:#0891b2;--green:#059669;--purple:#7c3aed;--border:#e5e7eb;--hover:#f3f4f6;--red:#dc2626;
        }
        *{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s,border-color 0.3s,color 0.2s}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
        
        .sidebar{width:250px;background:var(--side);border-right:1px solid var(--border);padding:24px 18px;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
        .sidebar .logo{text-align:center;margin-bottom:28px}
        .sidebar .logo img{max-width:100px;height:auto}
        .sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px;color:var(--sub);text-decoration:none;font-size:13px;font-weight:500}
        .sidebar nav a i{width:18px;text-align:center;font-size:15px}
        .sidebar nav a:hover{background:var(--hover);color:var(--text)}
        .sidebar nav a.active{background:rgba(34,211,238,0.06);color:var(--cyan)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red)}
        
        .main{flex:1;margin-left:250px;padding:28px 32px;overflow-y:auto;height:100vh}
        
        .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:20px}
        .pill{display:flex;gap:2px;background:var(--side);border:1px solid var(--border);border-radius:8px;padding:2px}
        .pill-btn{padding:6px 10px;border:none;background:none;color:var(--sub);font-size:10px;font-weight:600;cursor:pointer;border-radius:6px;font-family:'Inter',sans-serif}
        .pill-btn.active{background:var(--cyan);color:#fff}
        .theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--side);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .header h1{font-size:24px;font-weight:700;letter-spacing:-0.5px}
        .user{display:flex;align-items:center;gap:10px;background:var(--card);padding:7px 14px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
        .user .name{font-size:12px;font-weight:600}.user .name small{display:block;color:var(--sub);font-size:10px;font-weight:400}
        
        .search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 16px;margin-bottom:24px;max-width:400px}
        .search:focus-within{border-color:var(--cyan)}
        .search i{color:var(--sub)}
        .search input{background:none;border:none;color:var(--text);font-size:14px;outline:none;width:100%;font-family:'Inter',sans-serif}
        .search input::placeholder{color:#9ca3af}
        
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all 0.3s;position:relative;overflow:hidden}
        .card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.3s;background:linear-gradient(90deg,var(--cyan),var(--purple))}
        .card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
        .card:hover::after{opacity:1}
        .card .plan{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:3px 10px;border-radius:4px;margin-bottom:12px;background:rgba(34,211,238,0.08);color:var(--cyan);border:1px solid rgba(34,211,238,0.15)}
        .card h3{font-size:17px;font-weight:700;margin-bottom:6px}
        .card .loc{font-size:12px;color:var(--sub);margin-bottom:14px}
        .card .info{display:flex;gap:14px;margin-bottom:14px;font-size:12px;color:var(--sub)}
        .card .price{font-size:22px;font-weight:800;margin-bottom:14px}
        .card .price small{font-size:12px;color:var(--sub);font-weight:400}
        .card button{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--cyan),#0891b2);color:#fff}
        .card button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,211,238,0.2)}
        
        .empty{text-align:center;padding:60px 20px;color:var(--sub);grid-column:1/-1}
        .empty i{font-size:48px;opacity:0.1;display:block;margin-bottom:16px}
        
        .hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;position:fixed;top:16px;left:16px;z-index:60}
        @media(max-width:768px){.hamburger{display:block}.sidebar{transform:translateX(-100%);position:fixed;z-index:55}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:16px}.grid{grid-template-columns:1f}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"></div>
        <nav>
            <a href="#" class="active"><i class="fas fa-dumbbell"></i> <span data-es="Gimnasios" data-en="Gyms">Gimnasios</span></a>
            <a href="suscripciones.html"><i class="fas fa-receipt"></i> <span data-es="Suscripciones" data-en="Subscriptions">Suscripciones</span></a>
            <a href="entrenadores.html"><i class="fas fa-user-graduate"></i> <span data-es="Entrenadores" data-en="Trainers">Entrenadores</span></a>
            <a href="extras.html"><i class="fas fa-gem"></i> <span data-es="Extras" data-en="Extras">Extras</span></a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> <span data-es="Salir" data-en="Logout">Salir</span></a>
        </nav>
    </aside>
    <main class="main">
        <div class="top-bar">
            <div class="pill" id="langSwitch">
                <button class="pill-btn active" onclick="setLang('es',this)">ES</button>
                <button class="pill-btn" onclick="setLang('en',this)">EN</button>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
        </div>
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div class="header">
            <div><h1 data-es="Gimnasios" data-en="Gyms">Gimnasios</h1><p style="color:var(--sub);font-size:13px;margin-top:2px" data-es="Encuentra tu espacio ideal" data-en="Find your ideal space">Encuentra tu espacio ideal</p></div>
            <div class="user"><div class="avatar" id="ua">CL</div><div class="name" id="ui">Cargando...</div></div>
        </div>
        <div class="search"><i class="fas fa-search"></i><input type="text" id="buscar" data-placeholder-es="Buscar gimnasio..." data-placeholder-en="Search gym..." placeholder="Buscar gimnasio..."></div>
        <div class="grid" id="grid"><div class="empty"><i class="fas fa-spinner fa-spin"></i><p>Cargando...</p></div></div>
    </main>
    <script>
        const API=window.location.origin;let gimnasios=[];
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        
        // Tema
        function toggleTheme(){const html=document.documentElement;const t=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',t);localStorage.setItem('theme',t)}
        (function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
        
        // Idioma
        function setLang(lang,btn){
            document.querySelectorAll('#langSwitch .pill-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('[data-es][data-en]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));
            const search=document.getElementById('buscar');
            if(search)search.placeholder=search.getAttribute('data-placeholder-'+lang);
            localStorage.setItem('lang',lang);
        }
        (function(){const l=localStorage.getItem('lang')||'es';setLang(l,document.querySelector('#langSwitch .pill-btn[onclick*="'+l+'"]')||document.querySelector('#langSwitch .pill-btn'))})();
        
        async function cargar(){try{const r=await fetch(API+'/api/gimnasios');const d=await r.json();if(d.status==='success'){gimnasios=d.data||[];render()}}catch(e){document.getElementById('grid').innerHTML='<div class="empty"><i class="fas fa-plug"></i><p>Error</p></div>'}}
        function render(){const g=document.getElementById('grid'),b=document.getElementById('buscar').value.toLowerCase();let f=gimnasios;if(b)f=gimnasios.filter(x=>(x.nombre||'').toLowerCase().includes(b)||(x.estado||'').toLowerCase().includes(b)||(x.municipio||'').toLowerCase().includes(b));if(!f.length){g.innerHTML='<div class="empty"><i class="fas fa-dumbbell"></i><h3>Sin resultados</h3></div>';return}
        g.innerHTML=f.map(x=>{const p=x.plan||'basico',pr=p==='basico'?500:p==='pro'?800:1200;return'<div class="card"><span class="plan">'+p.toUpperCase()+'</span><h3>'+x.nombre+'</h3><div class="loc"><i class="fas fa-map-pin"></i> '+(x.estado||'')+', '+(x.municipio||'')+'</div><div class="info"><span><i class="fas fa-phone"></i> '+(x.telefono||'N/A')+'</span></div><div class="price">$'+pr+'<small>/mes</small></div><button onclick="pagar(\''+x.id+'\')">Suscribirse</button></div>'}).join('')}
        function pagar(id){const x=gimnasios.find(g=>g.id===id);if(!x)return;const p=x.plan||'basico',pr=p==='basico'?500:p==='pro'?800:1200;window.location.href='pago.html?gym='+id+'&plan='+p+'&precio='+pr+'&nombre='+encodeURIComponent(x.nombre||'Gimnasio')}
        document.getElementById('buscar').addEventListener('input',render);
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='cliente'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small>Cliente</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}cargar()});
    </script>
</body>
</html>
