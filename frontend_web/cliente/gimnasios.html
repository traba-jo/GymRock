<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Gimnasios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0D0D1A;--card:rgba(255,255,255,0.03);--side:#111128;--border:rgba(255,255,255,0.06);--white:#F0F0F5;--gray:#8A8AA8;--gold:#D4AF37;--red:#DC2626}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);display:flex;min-height:100vh}
        .sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:24px 16px;position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column}
        .sidebar .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
        .sidebar .logo img{width:40px;height:40px;border-radius:8px}
        .sidebar .logo span{font-size:20px;font-weight:800}.sidebar .logo span span{color:var(--gold)}
        .sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;color:var(--gray);text-decoration:none;font-size:14px;font-weight:500}
        .sidebar nav a:hover{background:rgba(212,175,55,0.06);color:var(--white)}
        .sidebar nav a.active{background:rgba(212,175,55,0.08);color:var(--gold);border-left:3px solid var(--gold)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red);border-top:1px solid var(--border);padding-top:16px}
        .main{margin-left:260px;flex:1;padding:24px 32px;overflow-y:auto;height:100vh}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:16px}
        .header h1{font-size:24px;font-weight:700}.header p{color:var(--gray);font-size:14px}
        .user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#B8941E);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D0D1A}
        .search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 16px;max-width:400px;margin-bottom:24px}
        .search input{background:none;border:none;color:var(--white);font-size:14px;outline:none;width:100%}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
        .card:hover{border-color:var(--gold);transform:translateY(-4px)}
        .card h3{font-size:18px;margin-bottom:8px}
        .card .dir{color:var(--gray);font-size:13px;margin-bottom:12px}
        .card .info{display:flex;gap:16px;margin-bottom:16px;font-size:13px;color:var(--gray)}
        .card .badge{display:inline-block;font-size:11px;padding:4px 12px;border-radius:50px;background:rgba(212,175,55,0.12);color:var(--gold);margin-bottom:12px}
        .card button{width:100%;padding:10px;background:linear-gradient(135deg,var(--gold),#B8941E);border:none;border-radius:10px;color:#0D0D1A;font-size:14px;font-weight:700;cursor:pointer}
        .empty{text-align:center;padding:60px;color:var(--gray);grid-column:1/-1}
        .hamburger{display:none;background:none;border:none;color:var(--white);font-size:24px;cursor:pointer}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:16px}.grid{grid-template-columns:1fr}.hamburger{display:block}}
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"><span>GYM<span>ROCK</span></span></div>
        <nav>
            <a href="#" class="active"><i class="fas fa-dumbbell"></i> Gimnasios</a>
            <a href="suscripciones.html"><i class="fas fa-receipt"></i> Mis Suscripciones</a>
            <a href="extras.html"><i class="fas fa-gem"></i> Extras</a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar sesion</a>
        </nav>
    </aside>
    <main class="main">
        <div class="header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
                <div><h1><i class="fas fa-dumbbell" style="color:var(--gold)"></i> Gimnasios</h1><p>Encuentra tu gimnasio ideal</p></div>
            </div>
            <div class="user"><div class="avatar" id="ua">CL</div><div class="info" id="ui">Cargando...</div></div>
        </div>
        <div class="search"><i class="fas fa-search" style="color:var(--gray)"></i><input type="text" id="buscar" placeholder="Buscar gimnasio..."></div>
        <div class="grid" id="grid"><div class="empty"><i class="fas fa-spinner fa-spin"></i><p>Cargando...</p></div></div>
    </main>
    <script>
        const API=window.location.origin;let gimnasios=[];
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        async function cargar(){try{const r=await fetch(API+'/api/gimnasios');const d=await r.json();if(d.status==='success'){gimnasios=d.data||[];render()}}catch(e){document.getElementById('grid').innerHTML='<div class="empty"><i class="fas fa-plug"></i><p>Error de conexion</p><button onclick="cargar()" style="margin-top:12px;padding:8px 20px;background:var(--gold);border:none;border-radius:8px;cursor:pointer;font-weight:600">Reintentar</button></div>'}}
        function render(){const g=document.getElementById('grid'),b=document.getElementById('buscar').value.toLowerCase();let f=gimnasios;if(b)f=gimnasios.filter(x=>(x.nombre||'').toLowerCase().includes(b));if(!f.length){g.innerHTML='<div class="empty"><i class="fas fa-dumbbell" style="font-size:48px;opacity:0.2;display:block;margin-bottom:16px"></i><p style="font-size:18px;color:var(--white)">No hay gimnasios</p></div>';return}
        g.innerHTML=f.map(x=>{const p=x.plan||'basico',pr=p==='basico'?500:p==='pro'?800:1200;return'<div class="card"><span class="badge">'+p.toUpperCase()+'</span><h3>'+x.nombre+'</h3><div class="dir"><i class="fas fa-map-pin"></i> '+(x.estado||'')+', '+(x.municipio||'')+'</div><div class="info"><span><i class="fas fa-phone"></i> '+(x.telefono||'N/A')+'</span><span><i class="fas fa-tag"></i> $'+pr+'/mes</span></div><button onclick="pagar(\''+x.id+'\')"><i class="fas fa-credit-card"></i> Suscribirse</button></div>'}).join('')}
        function pagar(id){const x=gimnasios.find(g=>g.id===id);if(!x)return;const p=x.plan||'basico',pr=p==='basico'?500:p==='pro'?800:1200;window.location.href='pago.html?gym='+id+'&plan='+p+'&precio='+pr+'&nombre='+encodeURIComponent(x.nombre||'Gimnasio')}
        document.getElementById('buscar').addEventListener('input',render);
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='cliente'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small style="color:var(--gray);font-size:11px">Cliente</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}cargar()});
    </script>
</body>
</html>
