<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Pagar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0D0D1A;
            color: #F0F0F5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        h1 span { color: #D4AF37; }
        p { color: #8A8AA8; margin-bottom: 20px; }
        .plan-info {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .precio { font-size: 40px; font-weight: 800; color: #D4AF37; }
        .btn-pagar {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #D4AF37, #B8941E);
            border: none;
            border-radius: 12px;
            color: #0D0D1A;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-pagar:hover { transform: translateY(-2px); }
        .btn-volver {
            display: inline-block;
            margin-top: 16px;
            color: #8A8AA8;
            text-decoration: none;
            font-size: 14px;
        }
        .error {
            color: #DC2626;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GYM<span>ROCK</span></h1>
        <p>Completa tu suscripcion</p>
        <div class="plan-info">
            <strong id="planNombre">Plan Mensual</strong><br>
            <span class="precio" id="planPrecio">$450</span> MXN<br>
            <small id="gymNombre">Gimnasio</small>
        </div>
        <button class="btn-pagar" onclick="pagar()">Pagar con Mercado Pago</button>
        <p class="error" id="errorMsg"></p>
        <a href="gimnasios.html" class="btn-volver">Volver a Gimnasios</a>
    </div>
    <script>
        const API_URL = window.location.origin;
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('planNombre').textContent = 'Plan ' + (params.get('plan') || 'Mensual');
        document.getElementById('planPrecio').textContent = '$' + (params.get('precio') || '450');
        document.getElementById('gymNombre').textContent = params.get('nombre') || 'Gimnasio';
        
        async function pagar() {
            const token = localStorage.getItem('gymrock_token');
            const userData = JSON.parse(localStorage.getItem('gymrock_user') || '{}');
            
            if (!token) {
                document.getElementById('errorMsg').textContent = 'Debes iniciar sesion como cliente primero';
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }
            
            document.getElementById('errorMsg').style.display = 'none';
            
            try {
                const res = await fetch(API_URL + '/api/crear-preferencia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        descripcion: 'Suscripcion GymRock - ' + (params.get('nombre') || 'Gimnasio'),
                        monto: parseFloat(params.get('precio') || '450'),
                        gimnasio_id: params.get('gym') || '',
                        nombre: userData.nombre || 'Cliente',
                        email: userData.email || 'cliente@test.com'
                    })
                });
                
                if (!res.ok) {
                    throw new Error('Error del servidor: ' + res.status);
                }
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    window.location.href = data.init_point;
                } else {
                    document.getElementById('errorMsg').textContent = 'Error: ' + (data.error || 'Intenta de nuevo');
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMsg').textContent = 'Error de conexion. Verifica tu internet.';
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
