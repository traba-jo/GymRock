<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Suscriptores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#06060E;--side:#0A0A14;--card:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.04);--white:#EDEDF5;--gray:#8888A0;--purple:#8b5cf6;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);display:flex;min-height:100vh}
        .sidebar{width:270px;background:var(--side);border-right:1px solid var(--border);padding:28px 20px;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
        .sidebar .logo{font-size:24px;font-weight:900;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border)}
        .sidebar .logo span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sidebar nav{display:flex;flex-direction:column;gap:6px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:12px;color:var(--gray);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s}
        .sidebar nav a i{width:20px;text-align:center}
        .sidebar nav a:hover{background:rgba(59,130,246,0.06);color:var(--white)}
        .sidebar nav a.active{background:linear-gradient(135deg,rgba(59,130,246,0.12),rgba(139,92,246,0.08));color:var(--white);border:1px solid rgba(59,130,246,0.15)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red);border-top:1px solid var(--border);padding-top:20px}
        .main{margin-left:270px;flex:1;padding:32px 40px;overflow-y:auto;height:100vh}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:16px}
        .header h1{font-size:28px;font-weight:800}.header h1 i{color:var(--blue)}
        .user{display:flex;align-items:center;gap:14px;background:var(--card);padding:8px 18px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
        .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
        .metric{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px}
        .metric .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:6px}
        .metric .value{font-size:28px;font-weight:800}
        .empty-state{text-align:center;padding:60px 20px;background:var(--card);border:1px solid var(--border);border-radius:20px}
        .empty-state .icon{font-size:64px;display:block;margin-bottom:16px;opacity:0.2}
        .empty-state h2{font-size:22px;font-weight:700;margin-bottom:8px}
        .empty-state p{color:var(--gray)}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}}
        .hamburger{display:none;background:none;border:none;color:var(--white);font-size:24px;cursor:pointer}@media(max-width:768px){.hamburger{display:block}}
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="logo"><span>GYMROCK</span></div>
        <nav>
            <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="entrenadores.html"><i class="fas fa-users"></i> Entrenadores</a>
            <a href="#" class="active"><i class="fas fa-user-check"></i> Suscriptores</a>
            <a href="configuracion.html"><i class="fas fa-cog"></i> Configuracion</a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar sesion</a>
        </nav>
    </aside>
    <main class="main">
        <div class="header">
            <div style="display:flex;align-items:center;gap:14px">
                <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
                <div><h1><i class="fas fa-user-check"></i> Suscriptores</h1><p style="color:var(--gray);font-size:14px">Gestiona las membresias</p></div>
            </div>
            <div class="user"><div class="avatar" id="ua">GR</div><div class="info" id="ui">Cargando...</div></div>
        </div>
        <div class="metrics">
            <div class="metric"><div class="label">Activos</div><div class="value" style="color:var(--green)">0</div></div>
            <div class="metric"><div class="label">Por Vencer</div><div class="value" style="color:var(--amber)">0</div></div>
            <div class="metric"><div class="label">Vencidos</div><div class="value" style="color:var(--red)">0</div></div>
            <div class="metric"><div class="label">Ingresos</div><div class="value">$0</div></div>
        </div>
        <div class="empty-state">
            <span class="icon">📋</span>
            <h2>Aun no tienes suscriptores</h2>
            <p>Cuando los clientes se suscriban apareceran aqui</p>
        </div>
    </main>
    <script>
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='gimnasio'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small style="color:var(--gray);font-size:11px">Admin</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}});
    </script>
</body>
</html>
