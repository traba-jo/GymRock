<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#06060c;--side:#0a0a14;--card:#0f0f1a;--text:#e8e8f0;--sub:#8888a0;
            --blue:#4dabf7;--purple:#9775fa;--green:#38d9a9;--amber:#ffc078;--red:#ff6b6b;
            --border:#181828;--hover:#141424;--gradient:linear-gradient(135deg,#4dabf7,#9775fa);
        }
        [data-theme="light"] {
            --bg:#f8f9fc;--side:#ffffff;--card:#ffffff;--text:#1a1a2e;--sub:#6b7280;
            --blue:#228be6;--purple:#7950f2;--green:#12b886;--amber:#f59f00;--red:#e03131;
            --border:#e5e7eb;--hover:#f3f4f6;--gradient:linear-gradient(135deg,#228be6,#7950f2);
        }
        *{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s,border-color 0.3s,color 0.2s}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
        
        .sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:28px 20px;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform 0.3s}
        .sidebar .logo{text-align:center;margin-bottom:32px}
        .sidebar .logo img{max-width:110px;height:auto;filter:drop-shadow(0 0 20px rgba(77,171,247,0.2))}
        .sidebar .brand{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;text-align:center;margin-top:4px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sidebar nav{display:flex;flex-direction:column;gap:6px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;color:var(--sub);text-decoration:none;font-size:13px;font-weight:500;position:relative;overflow:hidden}
        .sidebar nav a::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform 0.3s}
        .sidebar nav a i{width:20px;text-align:center;font-size:16px}
        .sidebar nav a:hover{background:var(--hover);color:var(--text)}
        .sidebar nav a:hover::before{transform:scaleY(1)}
        .sidebar nav a.active{background:rgba(77,171,247,0.06);color:var(--blue)}
        .sidebar nav a.active::before{transform:scaleY(1)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red)}
        
        .main{flex:1;margin-left:260px;padding:28px 36px;overflow-y:auto;height:100vh}
        
        .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-bottom:24px}
        .pill{display:flex;gap:2px;background:var(--side);border:1px solid var(--border);border-radius:10px;padding:3px}
        .pill-btn{padding:7px 12px;border:none;background:none;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif}
        .pill-btn.active{background:var(--gradient);color:#fff}
        .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--side);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}
        .theme-btn:hover{border-color:var(--blue)}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .header h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px}
        .user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;cursor:pointer;overflow:hidden;background-size:cover;background-position:center;position:relative}
        .user .avatar:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:14px}
        .user .name{font-size:12px;font-weight:600}.user .name small{display:block;color:var(--sub);font-size:10px;font-weight:400}
        
        .trial-bar{background:rgba(56,217,169,0.04);border:1px solid rgba(56,217,169,0.12);border-radius:12px;padding:14px 20px;margin-bottom:24px;display:none;justify-content:space-between;align-items:center}
        .trial-bar.active{display:flex}
        .trial-bar strong{color:var(--green);font-family:'Space Grotesk',sans-serif}
        .trial-bar span{color:var(--sub);font-size:12px}
        .trial-bar button{padding:8px 20px;background:var(--green);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
        
        .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
        .metric{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
        .metric::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.03;font-size:40px;display:flex;align-items:center;justify-content:center}
        .metric:nth-child(1)::after{background:var(--blue);content:'👥'}
        .metric:nth-child(2)::after{background:var(--green);content:'💰'}
        .metric:nth-child(3)::after{background:var(--amber);content:'⏰'}
        .metric:nth-child(4)::after{background:var(--purple);content:'📋'}
        .metric .label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:6px;font-weight:600}
        .metric .value{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700}
        .metric:nth-child(1) .value{color:var(--blue)}
        .metric:nth-child(2) .value{color:var(--green)}
        .metric:nth-child(3) .value{color:var(--amber)}
        .metric:nth-child(4) .value{color:var(--purple)}
        
        .section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px}
        .section h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .section h3 i{color:var(--blue)}
        table{width:100%;border-collapse:collapse;font-size:12px}
        th{text-align:left;padding:10px 8px;color:var(--sub);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
        td{padding:10px 8px;border-bottom:1px solid var(--border);color:var(--sub)}
        td strong{color:var(--text)}
        
        .hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;position:fixed;top:20px;left:20px;z-index:60}
        @media(max-width:768px){.hamburger{display:block}.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}.metrics{grid-template-columns:1fr 1fr}.trial-bar{flex-direction:column;text-align:center}}
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="cambiarAvatar(event)">
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"></div>
        <div class="brand">GYMROCK</div>
        <nav>
            <a href="#" class="active"><i class="fas fa-chart-pie"></i> <span data-es="Dashboard" data-en="Dashboard">Dashboard</span></a>
            <a href="entrenadores.html"><i class="fas fa-users"></i> <span data-es="Entrenadores" data-en="Trainers">Entrenadores</span></a>
            <a href="suscriptores.html"><i class="fas fa-user-check"></i> <span data-es="Suscriptores" data-en="Subscribers">Suscriptores</span></a>
            <a href="configuracion.html"><i class="fas fa-cog"></i> <span data-es="Configuración" data-en="Settings">Configuración</span></a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> <span data-es="Salir" data-en="Logout">Salir</span></a>
        </nav>
    </aside>
    <main class="main">
        <div class="top-bar">
            <div class="pill">
                <button class="pill-btn active" onclick="setLang('es',this)">ES</button>
                <button class="pill-btn" onclick="setLang('en',this)">EN</button>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="header">
            <div><h1 data-es="Dashboard" data-en="Dashboard">Dashboard</h1><p style="color:var(--sub);font-size:13px;margin-top:4px" data-es="Panel de control de tu gimnasio" data-en="Your gym control panel">Panel de control de tu gimnasio</p></div>
            <div class="user"><div class="avatar" id="ua" onclick="document.getElementById('avatarInput').click()" title="Cambiar foto">GR</div><div class="name" id="ui">Cargando...</div></div>
        </div>
        
        <div class="trial-bar" id="trialBanner">
            <div><strong data-es="🎁 Periodo de prueba activo" data-en="🎁 Trial period active">🎁 Periodo de prueba activo</strong><br><span id="trialInfo"></span></div>
            <button onclick="window.location.href='pago_licencia.html'" data-es="Activar Plan" data-en="Activate Plan">Activar Plan</button>
        </div>
        
        <div class="metrics">
            <div class="metric"><div class="label" data-es="Suscriptores" data-en="Subscribers">Suscriptores</div><div class="value" id="totalSuscriptores">0</div></div>
            <div class="metric"><div class="label" data-es="Ingresos del Mes" data-en="Monthly Income">Ingresos del Mes</div><div class="value" id="ingresosMes">$0</div></div>
            <div class="metric"><div class="label" data-es="Por Vencer" data-en="Expiring Soon">Por Vencer</div><div class="value" id="cortesProximos">0</div></div>
            <div class="metric"><div class="label" data-es="Licencia" data-en="License">Licencia</div><div class="value" id="estadoLicencia" style="font-size:14px">✅ Activa</div></div>
        </div>
        
        <div class="section">
            <h3><i class="fas fa-users"></i> <span data-es="Suscriptores Recientes" data-en="Recent Subscribers">Suscriptores Recientes</span></h3>
            <table><thead><tr><th data-es="Cliente" data-en="Client">Cliente</th><th>Email</th><th data-es="Plan" data-en="Plan">Plan</th><th data-es="Estado" data-en="Status">Estado</th></tr></thead>
            <tbody><tr><td colspan="4" style="text-align:center;color:var(--sub);padding:24px" data-es="Aún no tienes suscriptores" data-en="No subscribers yet">Aún no tienes suscriptores</td></tr></tbody></table>
        </div>
    </main>
    <script>
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        function toggleTheme(){const h=document.documentElement;const t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t)}
        (function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
        function setLang(lang,btn){document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('[data-es][data-en]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));localStorage.setItem('lang',lang)}
        (function(){const l=localStorage.getItem('lang')||'es';const b=document.querySelector('.pill-btn[onclick*="'+l+'"]');if(b)setLang(l,b)})();
        function cambiarAvatar(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){document.getElementById('ua').style.backgroundImage='url('+ev.target.result+')';document.getElementById('ua').textContent='';localStorage.setItem('avatar',ev.target.result)};reader.readAsDataURL(file)}
        (function(){const saved=localStorage.getItem('avatar');if(saved){document.getElementById('ua').style.backgroundImage='url('+saved+')';document.getElementById('ua').textContent=''}})();
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='gimnasio'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small>Admin</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}if(u.periodo_prueba){document.getElementById('trialBanner').classList.add('active');if(u.fecha_corte)document.getElementById('trialInfo').textContent='Vence: '+u.fecha_corte}});
    </script>
</body>
</html>
