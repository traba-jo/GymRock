<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#06060c;--side:#0a0a14;--card:#0f0f1a;--text:#e8e8f0;--sub:#8888a0;
            --blue:#4dabf7;--purple:#9775fa;--green:#38d9a9;--amber:#ffc078;--red:#ff6b6b;
            --border:#181828;--hover:#141424;--gradient:linear-gradient(135deg,#4dabf7,#9775fa);
        }
        [data-theme="light"] {
            --bg:#f8f9fc;--side:#ffffff;--card:#ffffff;--text:#1a1a2e;--sub:#6b7280;
            --blue:#228be6;--purple:#7950f2;--green:#12b886;--amber:#f59f00;--red:#e03131;
            --border:#e5e7eb;--hover:#f3f4f6;--gradient:linear-gradient(135deg,#228be6,#7950f2);
        }
        *{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s,border-color 0.3s,color 0.2s}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
        
        .sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:28px 20px;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform 0.3s}
        .sidebar .logo{text-align:center;margin-bottom:32px}
        .sidebar .logo img{max-width:110px;height:auto;filter:drop-shadow(0 0 20px rgba(77,171,247,0.2))}
        .sidebar nav{display:flex;flex-direction:column;gap:6px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;color:var(--sub);text-decoration:none;font-size:13px;font-weight:500;position:relative;overflow:hidden}
        .sidebar nav a::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform 0.3s}
        .sidebar nav a i{width:20px;text-align:center;font-size:16px}
        .sidebar nav a:hover{background:var(--hover);color:var(--text)}
        .sidebar nav a:hover::before{transform:scaleY(1)}
        .sidebar nav a.active{background:rgba(77,171,247,0.06);color:var(--blue)}
        .sidebar nav a.active::before{transform:scaleY(1)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red)}
        
        .main{flex:1;margin-left:260px;padding:28px 36px;overflow-y:auto;height:100vh}
        .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-bottom:24px}
        .pill{display:flex;gap:2px;background:var(--side);border:1px solid var(--border);border-radius:10px;padding:3px}
        .pill-btn{padding:7px 12px;border:none;background:none;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif}
        .pill-btn.active{background:var(--gradient);color:#fff}
        .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--side);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .header h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px}
        .user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;cursor:pointer;overflow:hidden;background-size:cover;background-position:center;position:relative}
        .user .avatar:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:14px}
        .user .name{font-size:12px;font-weight:600}.user .name small{display:block;color:var(--sub);font-size:10px;font-weight:400}
        
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
        .card h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .card h3 i{color:var(--blue)}
        .field{margin-bottom:12px}
        .field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--sub);margin-bottom:4px;font-weight:600}
        .field input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;font-family:'Inter',sans-serif}
        .field input:focus{border-color:var(--blue)}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s}
        .btn-save{background:var(--gradient);color:#fff}
        .btn-gold{background:linear-gradient(135deg,var(--amber),#f08c00);color:#fff}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--sub)}
        .btn:hover{transform:translateY(-1px)}
        
        .licencia-bar{display:flex;justify-content:space-between;align-items:center;padding:16px;background:rgba(56,217,169,0.04);border:1px solid rgba(56,217,169,0.12);border-radius:10px;margin-top:8px;flex-wrap:wrap;gap:10px}
        .licencia-bar .plan-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--green)}
        .licencia-bar .plan-date{font-size:12px;color:var(--sub)}
        .banco-preview{background:rgba(77,171,247,0.04);border:1px solid rgba(77,171,247,0.1);border-radius:8px;padding:10px;font-size:11px;color:var(--sub);margin-top:8px}
        .banco-preview strong{color:var(--text);font-family:'JetBrains Mono',monospace}
        
        .hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;position:fixed;top:20px;left:20px;z-index:60}
        @media(max-width:768px){.hamburger{display:block}.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="cambiarAvatar(event)">
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"></div>
        <nav>
            <a href="dashboard.html"><i class="fas fa-chart-pie"></i> <span data-es="Dashboard" data-en="Dashboard">Dashboard</span></a>
            <a href="entrenadores.html"><i class="fas fa-users"></i> <span data-es="Entrenadores" data-en="Trainers">Entrenadores</span></a>
            <a href="suscriptores.html"><i class="fas fa-user-check"></i> <span data-es="Suscriptores" data-en="Subscribers">Suscriptores</span></a>
            <a href="#" class="active"><i class="fas fa-cog"></i> <span data-es="Configuración" data-en="Settings">Configuración</span></a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> <span data-es="Salir" data-en="Logout">Salir</span></a>
        </nav>
    </aside>
    <main class="main">
        <div class="top-bar">
            <div class="pill"><button class="pill-btn active" onclick="setLang('es',this)">ES</button><button class="pill-btn" onclick="setLang('en',this)">EN</button></div>
            <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="header">
            <div><h1 data-es="Configuración" data-en="Settings">Configuración</h1><p style="color:var(--sub);font-size:13px;margin-top:4px" data-es="Administra tu gimnasio" data-en="Manage your gym">Administra tu gimnasio</p></div>
            <div class="user"><div class="avatar" id="ua" onclick="document.getElementById('avatarInput').click()" title="Cambiar foto">GR</div><div class="name" id="ui">Cargando...</div></div>
        </div>
        <div class="grid">
            <!-- Perfil -->
            <div class="card">
                <h3><i class="fas fa-store"></i> <span data-es="Perfil del Gimnasio" data-en="Gym Profile">Perfil del Gimnasio</span></h3>
                <div class="field"><label data-es="Nombre" data-en="Name">Nombre</label><input type="text" id="gymNombre"></div>
                <div class="field"><label data-es="Teléfono" data-en="Phone">Teléfono</label><input type="text" id="gymTel"></div>
                <div class="field"><label>Email</label><input type="email" id="gymEmail" disabled style="opacity:0.5"></div>
                <button class="btn btn-save" onclick="guardarPerfil()"><i class="fas fa-save"></i> <span data-es="Guardar Cambios" data-en="Save Changes">Guardar Cambios</span></button>
            </div>
            
            <!-- Licencia -->
            <div class="card">
                <h3><i class="fas fa-file-contract"></i> <span data-es="Licencia GymRock" data-en="GymRock License">Licencia GymRock</span></h3>
                <div class="licencia-bar">
                    <div><div class="plan-name" id="estadoLic">✅ Activa</div><div class="plan-date" id="fechaLic">--</div></div>
                    <button class="btn btn-gold" onclick="window.location.href='pago_licencia.html'"><i class="fas fa-sync"></i> <span data-es="Renovar Licencia" data-en="Renew License">Renovar Licencia</span></button>
                </div>
            </div>
            
            <!-- Datos Bancarios -->
            <div class="card" style="border:1px solid rgba(77,171,247,0.2)">
                <h3><i class="fas fa-credit-card"></i> <span data-es="Datos Bancarios" data-en="Bank Details">Datos Bancarios</span> <span style="font-size:9px;background:rgba(77,171,247,0.1);color:var(--blue);padding:3px 8px;border-radius:4px" data-es="Para cobrar a clientes" data-en="To charge clients">Para cobrar a clientes</span></h3>
                <div class="field"><label data-es="Banco" data-en="Bank">Banco</label><input type="text" id="bancoNombre" placeholder="BBVA"></div>
                <div class="field"><label data-es="Titular" data-en="Account Holder">Titular</label><input type="text" id="bancoTitular"></div>
                <div class="field"><label data-es="Cuenta/Tarjeta" data-en="Account/Card">Cuenta/Tarjeta</label><input type="text" id="bancoCuenta" placeholder="4815 1632 9824 3091"></div>
                <div class="banco-preview">🔒 <span data-es="Vista del cliente:" data-en="Client view:">Vista del cliente:</span> <strong id="previewBanco">--</strong></div>
                <button class="btn btn-save" onclick="guardarBanco()" style="margin-top:12px"><i class="fas fa-save"></i> <span data-es="Guardar Datos" data-en="Save Details">Guardar Datos</span></button>
            </div>
            
            <!-- Planes -->
            <div class="card">
                <h3><i class="fas fa-crown"></i> <span data-es="Planes para Clientes" data-en="Client Plans">Planes para Clientes</span></h3>
                <div class="field"><label data-es="Mensual (MXN)" data-en="Monthly (MXN)">Mensual (MXN)</label><input type="number" id="planMensual" value="450"></div>
                <div class="field"><label data-es="Quincenal (MXN)" data-en="Biweekly (MXN)">Quincenal (MXN)</label><input type="number" id="planQuincenal" value="250"></div>
                <button class="btn btn-save" onclick="guardarPlanes()"><i class="fas fa-save"></i> <span data-es="Guardar Planes" data-en="Save Plans">Guardar Planes</span></button>
            </div>
            
            <!-- Test Clase A -->
            <div class="card">
                <h3><i class="fas fa-clipboard-check"></i> <span data-es="Personalizar Test Clase A" data-en="Customize Class A Test">Personalizar Test Clase A</span></h3>
                <div class="field"><label data-es="Pregunta 1" data-en="Question 1">Pregunta 1</label><input type="text" id="testP1" placeholder="¿Por qué quieres ser entrenador?"></div>
                <div class="field"><label data-es="Pregunta 2" data-en="Question 2">Pregunta 2</label><input type="text" id="testP2" placeholder="Describe tu experiencia"></div>
                <div class="field"><label data-es="Pregunta 3" data-en="Question 3">Pregunta 3</label><input type="text" id="testP3" placeholder="¿Cómo manejas un cliente nuevo?"></div>
                <button class="btn btn-save" onclick="guardarTestA()"><i class="fas fa-save"></i> <span data-es="Guardar Preguntas" data-en="Save Questions">Guardar Preguntas</span></button>
            </div>
        </div>
    </main>
    <script>
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'))}
        (function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')})();
        function setLang(lang,btn){document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('[data-es][data-en]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));localStorage.setItem('lang',lang)}
        (function(){const l=localStorage.getItem('lang')||'es';const b=document.querySelector('.pill-btn[onclick*="'+l+'"]');if(b)setLang(l,b)})();
        function cambiarAvatar(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){document.getElementById('ua').style.backgroundImage='url('+ev.target.result+')';document.getElementById('ua').textContent='';localStorage.setItem('avatar',ev.target.result)};reader.readAsDataURL(file)}
        (function(){const saved=localStorage.getItem('avatar');if(saved){document.getElementById('ua').style.backgroundImage='url('+saved+')';document.getElementById('ua').textContent=''}})();
        
        function guardarPerfil(){alert('✅ Perfil guardado')}
        function guardarPlanes(){alert('✅ Planes guardados')}
        function guardarBanco(){const b=document.getElementById('bancoNombre').value,t=document.getElementById('bancoTitular').value,c=document.getElementById('bancoCuenta').value.replace(/\s/g,'');if(!b||!t||!c){alert('Completa todos los campos');return}document.getElementById('previewBanco').textContent=b+' · ***'+c.slice(-4);alert('✅ Datos bancarios guardados')}
        function guardarTestA(){const p=[];for(let i=1;i<=3;i++)p.push(document.getElementById('testP'+i).value.trim());localStorage.setItem('gym_testA',JSON.stringify(p));alert('✅ Preguntas guardadas')}
        
        document.getElementById('bancoCuenta').addEventListener('input',function(){const c=this.value.replace(/\s/g,'');if(c.length>=4)document.getElementById('previewBanco').textContent=(document.getElementById('bancoNombre').value||'Banco')+' · ***'+c.slice(-4)});
        
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='gimnasio'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small>Admin</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase();document.getElementById('gymNombre').value=u.nombre}if(u.email)document.getElementById('gymEmail').value=u.email;if(u.fecha_corte)document.getElementById('fechaLic').textContent='Vence: '+u.fecha_corte});
    </script>
</body>
</html>
