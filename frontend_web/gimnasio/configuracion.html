<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0A0E1A;--card:#111827;--side:#0F1524;--border:rgba(255,255,255,0.05);--white:#E8EDF5;--gray:#94A3B8;--blue:#2563EB;--gold:#F59E0B;--green:#22C55E;--red:#DC2626}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);display:flex;min-height:100vh}
        .sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:24px 16px;position:fixed;top:0;left:0;height:100vh;z-index:100}
        .sidebar .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
        .sidebar .logo img{width:40px;height:40px}.sidebar .logo span{font-size:20px;font-weight:800}.sidebar .logo span span{color:#60A5FA}
        .sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;color:var(--gray);text-decoration:none;font-size:14px;font-weight:500}
        .sidebar nav a:hover{background:rgba(37,99,235,0.08);color:var(--white)}
        .sidebar nav a.active{background:rgba(37,99,235,0.12);color:#60A5FA;border-left:3px solid var(--blue)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red);border-top:1px solid var(--border);padding-top:16px}
        .main{margin-left:260px;flex:1;padding:24px 32px;overflow-y:auto;height:100vh}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .header h1{font-size:24px}.header p{color:var(--gray);font-size:14px}
        .user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#1E3A8A);display:flex;align-items:center;justify-content:center;font-weight:700;color:white}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
        .card h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .card h3 i{color:#60A5FA}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:13px;color:var(--gray);margin-bottom:4px}
        .form-group input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:14px;outline:none}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
        .btn-primary{background:linear-gradient(135deg,var(--blue),#1E3A8A);color:white}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#B8941E);color:#0A0E1A}
        .licencia{display:flex;justify-content:space-between;align-items:center;padding:16px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.12);border-radius:10px;margin-top:8px;flex-wrap:wrap;gap:12px}
        .licencia .plan{font-size:18px;font-weight:700;color:var(--green)}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.main{margin-left:0;padding:16px}.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"><span>GYM<span>ROCK</span></span></div>
        <nav>
            <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="entrenadores.html"><i class="fas fa-users"></i> Entrenadores</a>
            <a href="suscriptores.html"><i class="fas fa-user-check"></i> Suscriptores</a>
            <a href="#" class="active"><i class="fas fa-cog"></i> Configuracion</a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar sesion</a>
        </nav>
    </aside>
    <main class="main">
        <div class="header">
            <div><h1><i class="fas fa-cog" style="color:#60A5FA"></i> Configuracion</h1><p>Administra tu gimnasio</p></div>
            <div class="user"><div class="avatar" id="ua">GR</div><div class="info" id="ui">Gimnasio<small style="font-size:11px;color:var(--gray)">Admin</small></div></div>
        </div>
        <div class="grid">
            <div class="card">
                <h3><i class="fas fa-store"></i> Perfil</h3>
                <div class="form-group"><label>Nombre</label><input type="text" id="gymNombre" placeholder="Nombre del gimnasio"></div>
                <div class="form-group"><label>Telefono</label><input type="text" id="gymTelefono" placeholder="Telefono"></div>
                <button class="btn btn-primary" onclick="alert('✅ Guardado')"><i class="fas fa-save"></i> Guardar</button>
            </div>
            <div class="card">
                <h3><i class="fas fa-file-contract"></i> Licencia</h3>
                <div class="licencia">
                    <div><div class="plan" id="estadoLic">Activa</div><div style="font-size:13px;color:var(--gray)" id="fechaLic">--</div></div>
                    <button class="btn btn-gold" onclick="window.location.href='pago_licencia.html'"><i class="fas fa-sync"></i> Renovar</button>
                </div>
            </div>
        </div>
    </main>
    <script>
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        document.addEventListener('DOMContentLoaded',()=>{
            const t=localStorage.getItem('gymrock_token');
            if(!t||localStorage.getItem('gymrock_rol')!=='gimnasio'){window.location.href='index.html';return}
            const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');
            if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small style="font-size:11px;color:var(--gray)">Admin</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase();document.getElementById('gymNombre').value=u.nombre}
            if(u.fecha_corte){document.getElementById('fechaLic').textContent='Vence: '+u.fecha_corte}
        });
    </script>
</body>
</html>
