<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Entrenadores Aprobados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#06060E;--card:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.04);--white:#EDEDF5;--gray:#8888A0;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--gold:#f59e0b}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;padding:32px}
        .container{max-width:900px;margin:0 auto}
        h1{font-size:28px;margin-bottom:24px}
        h1 span{color:var(--green)}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{text-align:left;padding:12px 10px;color:var(--gray);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
        td{padding:12px 10px;border-bottom:1px solid var(--border)}
        .codigo{font-family:monospace;background:rgba(34,197,94,0.1);color:var(--green);padding:6px 10px;border-radius:6px;font-weight:700}
        .badge{display:inline-block;font-size:10px;padding:4px 12px;border-radius:50px;font-weight:600}
        .badge-green{background:rgba(34,197,94,0.1);color:var(--green)}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none}
        .btn-back{background:var(--card);color:var(--gray);border:1px solid var(--border);margin-top:16px}
        .empty{text-align:center;padding:40px;color:var(--gray)}
        .error{text-align:center;padding:40px;color:var(--red)}
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ <span>Entrenadores Aprobados</span></h1>
        <div class="card">
            <div id="tabla"></div>
        </div>
        <a href="entrenadores.html" class="btn btn-back">← Volver a Entrenadores</a>
    </div>

    <script>
        // Cargar DIRECTAMENTE desde Supabase sin pasar por el backend
        const SUPABASE_URL = 'https://bsbjxkgjohskabvdloia.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KZljZ0Z1c2jAzMzG34Yc1Q_4RtnQPdk';
        
        async function cargarEntrenadores() {
            const userData = JSON.parse(localStorage.getItem('gymrock_user') || '{}');
            const gymId = userData.id;
            
            if (!gymId) {
                document.getElementById('tabla').innerHTML = '<div class="error">No se encontró el ID del gimnasio. Inicia sesión de nuevo.</div>';
                return;
            }
            
            document.getElementById('tabla').innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i> Cargando entrenadores...</div>';
            
            try {
                // Consulta DIRECTA a Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/entrenadores?gimnasio_id=eq.${gymId}&activo=eq.true`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const entrenadores = await response.json();
                
                if (entrenadores && entrenadores.length > 0) {
                    document.getElementById('tabla').innerHTML = `
                        <table>
                            <thead><tr><th>Nombre</th><th>Email</th><th>Especialidad</th><th>Código de Acceso</th><th>Precio</th><th>Estado</th></tr></thead>
                            <tbody>${entrenadores.map(e => `
                                <tr>
                                    <td><strong>${e.nombre || 'N/A'}</strong></td>
                                    <td>${e.email || 'N/A'}</td>
                                    <td>${e.especialidad || 'Entrenador'}</td>
                                    <td><span class="codigo">${e.codigo_acceso || 'N/A'}</span></td>
                                    <td>$${e.precio_sesion || 350}/sesión</td>
                                    <td><span class="badge badge-green">Activo</span></td>
                                </tr>
                            `).join('')}</tbody>
                        </table>`;
                } else {
                    document.getElementById('tabla').innerHTML = `
                        <div class="empty">
                            <p style="font-size:18px;color:var(--white);margin-bottom:8px">No hay entrenadores aprobados</p>
                            <p>Los entrenadores certificados aparecerán aquí</p>
                        </div>`;
                }
            } catch (error) {
                document.getElementById('tabla').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        // Verificar sesión
        const token = localStorage.getItem('gymrock_token');
        if (!token || localStorage.getItem('gymrock_rol') !== 'gimnasio') {
            window.location.href = 'index.html';
        } else {
            cargarEntrenadores();
        }
    </script>
</body>
</html>
