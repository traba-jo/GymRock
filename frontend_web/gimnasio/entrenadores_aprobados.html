<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Entrenadores Aprobados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#06060c;--side:#0a0a14;--card:#0f0f1a;--text:#e8e8f0;--sub:#8888a0;
            --blue:#4dabf7;--purple:#9775fa;--green:#38d9a9;--amber:#ffc078;--red:#ff6b6b;
            --border:#181828;--hover:#141424;--gradient:linear-gradient(135deg,#4dabf7,#9775fa);
        }
        [data-theme="light"] {
            --bg:#f8f9fc;--side:#ffffff;--card:#ffffff;--text:#1a1a2e;--sub:#6b7280;
            --blue:#228be6;--purple:#7950f2;--green:#12b886;--amber:#f59f00;--red:#e03131;
            --border:#e5e7eb;--hover:#f3f4f6;--gradient:linear-gradient(135deg,#228be6,#7950f2);
        }
        *{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s,border-color 0.3s,color 0.2s}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
        
        .sidebar{width:260px;background:var(--side);border-right:1px solid var(--border);padding:28px 20px;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform 0.3s}
        .sidebar .logo{text-align:center;margin-bottom:32px}
        .sidebar .logo img{max-width:110px;height:auto;filter:drop-shadow(0 0 20px rgba(77,171,247,0.2))}
        .sidebar nav{display:flex;flex-direction:column;gap:6px;flex:1}
        .sidebar nav a{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;color:var(--sub);text-decoration:none;font-size:13px;font-weight:500;position:relative;overflow:hidden}
        .sidebar nav a::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform 0.3s}
        .sidebar nav a i{width:20px;text-align:center;font-size:16px}
        .sidebar nav a:hover{background:var(--hover);color:var(--text)}
        .sidebar nav a:hover::before{transform:scaleY(1)}
        .sidebar nav a.active{background:rgba(77,171,247,0.06);color:var(--blue)}
        .sidebar nav a.active::before{transform:scaleY(1)}
        .sidebar nav a.logout{margin-top:auto;color:var(--red)}
        
        .main{flex:1;margin-left:260px;padding:28px 36px;overflow-y:auto;height:100vh}
        .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-bottom:24px}
        .pill{display:flex;gap:2px;background:var(--side);border:1px solid var(--border);border-radius:10px;padding:3px}
        .pill-btn{padding:7px 12px;border:none;background:none;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif}
        .pill-btn.active{background:var(--gradient);color:#fff}
        .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--side);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .header h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px}
        .header .badge-count{font-family:'Space Grotesk',sans-serif;font-size:14px;background:rgba(56,217,169,0.08);color:var(--green);padding:6px 16px;border-radius:50px;border:1px solid rgba(56,217,169,0.15)}
        .user{display:flex;align-items:center;gap:12px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
        .user .avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;cursor:pointer;overflow:hidden;background-size:cover;background-position:center;position:relative}
        .user .avatar:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:14px}
        .user .name{font-size:12px;font-weight:600}.user .name small{display:block;color:var(--sub);font-size:10px;font-weight:400}
        
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.3s;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient);opacity:0;transition:opacity 0.3s}
        .card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,0.3)}
        .card:hover::before{opacity:1}
        .card .card-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
        .card .trainer-avatar{width:52px;height:52px;border-radius:14px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff}
        .card h3{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700}
        .card .spec{font-size:12px;color:var(--sub)}
        .card .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
        .card .info-item{background:var(--bg);border-radius:8px;padding:10px 12px}
        .card .info-item .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:2px}
        .card .info-item .val{font-size:13px;font-weight:600}
        .card .codigo{font-family:'JetBrains Mono',monospace;background:rgba(56,217,169,0.06);color:var(--green);padding:6px 10px;border-radius:6px;font-size:13px;font-weight:700;text-align:center;margin-bottom:14px;letter-spacing:1px}
        .card .actions{display:flex;gap:8px}
        .card .actions button{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
        .card .actions button.revoke{color:var(--red);border-color:rgba(255,107,107,0.2)}
        .card .actions button.revoke:hover{background:rgba(255,107,107,0.06)}
        .card .actions button:hover{background:var(--hover)}
        
        .empty{text-align:center;padding:80px 40px;background:var(--card);border:1px solid var(--border);border-radius:16px}
        .empty i{font-size:56px;opacity:0.06;display:block;margin-bottom:18px}
        .empty h2{font-family:'Space Grotesk',sans-serif;font-size:22px;margin-bottom:6px}
        .empty p{color:var(--sub);font-size:13px;margin-bottom:18px}
        .empty .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:var(--gradient);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;text-decoration:none}
        
        .btn-back{display:inline-flex;align-items:center;gap:6px;color:var(--sub);text-decoration:none;font-size:13px;margin-top:20px}
        .btn-back:hover{color:var(--text)}
        
        .hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;position:fixed;top:20px;left:20px;z-index:60}
        @media(max-width:768px){.hamburger{display:block}.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="cambiarAvatar(event)">
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock"></div>
        <nav>
            <a href="dashboard.html"><i class="fas fa-chart-pie"></i> <span data-es="Dashboard" data-en="Dashboard">Dashboard</span></a>
            <a href="entrenadores.html"><i class="fas fa-users"></i> <span data-es="Entrenadores" data-en="Trainers">Entrenadores</span></a>
            <a href="#" class="active"><i class="fas fa-check-circle"></i> <span data-es="Aprobados" data-en="Approved">Aprobados</span></a>
            <a href="suscriptores.html"><i class="fas fa-user-check"></i> <span data-es="Suscriptores" data-en="Subscribers">Suscriptores</span></a>
            <a href="configuracion.html"><i class="fas fa-cog"></i> <span data-es="Configuración" data-en="Settings">Configuración</span></a>
            <a href="#" class="logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> <span data-es="Salir" data-en="Logout">Salir</span></a>
        </nav>
    </aside>
    <main class="main">
        <div class="top-bar">
            <div class="pill"><button class="pill-btn active" onclick="setLang('es',this)">ES</button><button class="pill-btn" onclick="setLang('en',this)">EN</button></div>
            <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="header">
            <div style="display:flex;align-items:center;gap:16px">
                <h1 data-es="Entrenadores Aprobados" data-en="Approved Trainers">Entrenadores Aprobados</h1>
                <span class="badge-count" id="totalCount">0</span>
            </div>
            <div class="user"><div class="avatar" id="ua" onclick="document.getElementById('avatarInput').click()" title="Cambiar foto">GR</div><div class="name" id="ui">Cargando...</div></div>
        </div>
        
        <div class="grid" id="grid">
            <div class="empty">
                <i class="fas fa-users"></i>
                <h2 data-es="No hay entrenadores aprobados" data-en="No approved trainers">No hay entrenadores aprobados</h2>
                <p data-es="Los entrenadores certificados aparecerán aquí" data-en="Certified trainers will appear here">Los entrenadores certificados aparecerán aquí</p>
            </div>
        </div>
        <a href="entrenadores.html" class="btn-back"><i class="fas fa-arrow-left"></i> <span data-es="Volver a Entrenadores" data-en="Back to Trainers">Volver a Entrenadores</span></a>
    </main>
    <script>
        const SUPABASE_URL='https://bsbjxkgjohskabvdloia.supabase.co';
        const SUPABASE_KEY='sb_publishable_KZljZ0Z1c2jAzMzG34Yc1Q_4RtnQPdk';
        
        function cerrarSesion(){localStorage.clear();window.location.href='../index.html'}
        function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'))}
        (function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')})();
        function setLang(lang,btn){document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('[data-es][data-en]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));localStorage.setItem('lang',lang)}
        (function(){const l=localStorage.getItem('lang')||'es';const b=document.querySelector('.pill-btn[onclick*="'+l+'"]');if(b)setLang(l,b)})();
        function cambiarAvatar(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){document.getElementById('ua').style.backgroundImage='url('+ev.target.result+')';document.getElementById('ua').textContent='';localStorage.setItem('avatar',ev.target.result)};reader.readAsDataURL(file)}
        (function(){const saved=localStorage.getItem('avatar');if(saved){document.getElementById('ua').style.backgroundImage='url('+saved+')';document.getElementById('ua').textContent=''}})();
        
        async function cargarAprobados(){
            const userData=JSON.parse(localStorage.getItem('gymrock_user')||'{}');
            const gymId=userData.id;
            if(!gymId)return;
            
            try{
                const r=await fetch(`${SUPABASE_URL}/rest/v1/entrenadores?gimnasio_id=eq.${gymId}&activo=eq.true`,{
                    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
                });
                const entrenadores=await r.json();
                const grid=document.getElementById('grid');
                document.getElementById('totalCount').textContent=entrenadores.length||0;
                
                if(entrenadores.length>0){
                    grid.innerHTML=entrenadores.map(e=>`
                        <div class="card">
                            <div class="card-header">
                                <div class="trainer-avatar">${(e.nombre||'EN').substring(0,2).toUpperCase()}</div>
                                <div><h3>${e.nombre||'N/A'}</h3><p class="spec">${e.especialidad||'Entrenador'}</p></div>
                            </div>
                            <div class="info-grid">
                                <div class="info-item"><div class="lbl">Email</div><div class="val" style="font-size:11px">${e.email||'N/A'}</div></div>
                                <div class="info-item"><div class="lbl">Precio</div><div class="val">$${e.precio_sesion||350}/sesión</div></div>
                                <div class="info-item"><div class="lbl">Certificación</div><div class="val">✅ Clase ${e.clase_cert||'B'}</div></div>
                                <div class="info-item"><div class="lbl">Estado</div><div class="val" style="color:var(--green)">● Activo</div></div>
                            </div>
                            <div class="codigo">${e.codigo_acceso||'N/A'}</div>
                            <div class="actions">
                                <button onclick="copiarCodigo('${e.codigo_acceso}')"><i class="fas fa-copy"></i> Copiar código</button>
                                <button class="revoke" onclick="revocarEntrenador('${e.id}')"><i class="fas fa-ban"></i> Revocar</button>
                            </div>
                        </div>
                    `).join('');
                }
            }catch(e){console.log(e)}
        }
        
        function copiarCodigo(codigo){navigator.clipboard.writeText(codigo);alert('✅ Código copiado: '+codigo)}
        function revocarEntrenador(id){if(confirm('¿Revocar este entrenador?')){alert('Entrenador revocado');cargarAprobados()}}
        
        document.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('gymrock_token');if(!t||localStorage.getItem('gymrock_rol')!=='gimnasio'){window.location.href='index.html';return}const u=JSON.parse(localStorage.getItem('gymrock_user')||'{}');if(u.nombre){document.getElementById('ui').innerHTML=u.nombre+'<br><small>Admin</small>';document.getElementById('ua').textContent=u.nombre.substring(0,2).toUpperCase()}cargarAprobados()});
    </script>
</body>
</html>
