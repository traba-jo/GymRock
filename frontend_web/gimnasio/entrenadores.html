<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Entrenadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0E1A;
            --bg-card: #111827;
            --bg-sidebar: #0F1524;
            --text-white: #E8EDF5;
            --text-gray: #94A3B8;
            --azul: #2563EB;
            --azul-oscuro: #1E3A8A;
            --azul-claro: #60A5FA;
            --rojo: #DC2626;
            --rojo-oscuro: #991B1B;
            --verde: #22C55E;
            --dorado: #F59E0B;
            --border-color: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar .logo-wrapper img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }

        .sidebar .logo-wrapper span {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-white);
        }

        .sidebar .logo-wrapper span span {
            color: var(--azul-claro);
        }

        .sidebar .nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sidebar .nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .sidebar .nav a i {
            width: 20px;
            font-size: 16px;
            transition: var(--transition);
        }

        .sidebar .nav a:hover {
            background: rgba(37, 99, 235, 0.08);
            color: var(--text-white);
        }

        .sidebar .nav a:hover i {
            color: var(--azul-claro);
        }

        .sidebar .nav a.active {
            background: rgba(37, 99, 235, 0.12);
            color: var(--azul-claro);
            border-left: 3px solid var(--azul);
        }

        .sidebar .nav a.active i {
            color: var(--azul-claro);
        }

        .sidebar .nav a.logout {
            margin-top: auto;
            color: var(--rojo);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .sidebar .nav a.logout:hover {
            background: rgba(220, 38, 38, 0.08);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            height: 100vh;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .greeting h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .greeting h1 i {
            color: var(--azul-claro);
        }

        .header .greeting p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .header .user {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            padding: 8px 16px 8px 12px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
        }

        .header .user .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .header .user .info {
            font-size: 13px;
            font-weight: 500;
        }

        .header .user .info small {
            display: block;
            font-weight: 400;
            color: var(--text-gray);
            font-size: 11px;
        }

        /* ============================================
           BOTÓN AGREGAR
           ============================================ */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }

        .btn-primary i {
            font-size: 16px;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-white);
        }

        /* ============================================
           ESTADÍSTICAS RÁPIDAS
           ============================================ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 16px 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--azul);
            transform: translateY(-2px);
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-white);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .stat-card .label i {
            margin-right: 4px;
        }

        .stat-card .badge-cert {
            display: inline-block;
            margin-top: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 50px;
            background: rgba(245, 158, 11, 0.12);
            color: var(--dorado);
        }

        /* ============================================
           TARJETAS DE ENTRENADORES
           ============================================ */
        .trainers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .trainer-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .trainer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--azul), var(--rojo));
            opacity: 0;
            transition: var(--transition);
        }

        .trainer-card:hover {
            border-color: var(--azul);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .trainer-card:hover::before {
            opacity: 1;
        }

        .trainer-card .header-card {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .trainer-card .avatar-card {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .trainer-card .info-card h4 {
            font-size: 16px;
            font-weight: 600;
        }

        .trainer-card .info-card .especialidad {
            font-size: 13px;
            color: var(--text-gray);
        }

        .trainer-card .info-card .especialidad i {
            margin-right: 4px;
            color: var(--azul-claro);
        }

        .trainer-card .cert-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 50px;
            background: rgba(245, 158, 11, 0.12);
            color: var(--dorado);
            border: 1px solid rgba(245, 158, 11, 0.15);
            margin-top: 4px;
        }

        .trainer-card .cert-badge i {
            font-size: 12px;
        }

        .trainer-card .details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .trainer-card .details .contact {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .trainer-card .details .contact i {
            color: var(--azul-claro);
            width: 16px;
        }

        .trainer-card .details .actions {
            display: flex;
            gap: 6px;
        }

        .trainer-card .details .actions button {
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: var(--transition);
            font-size: 14px;
        }

        .trainer-card .details .actions button:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .trainer-card .details .actions .edit:hover {
            color: var(--azul-claro);
        }

        .trainer-card .details .actions .delete:hover {
            color: var(--rojo);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 16px;
            }

            .trainers-grid {
                grid-template-columns: 1fr;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .header .greeting h1 {
                font-size: 20px;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }

            .trainer-card {
                padding: 18px 16px;
            }

            .trainer-card .header-card {
                flex-direction: column;
                text-align: center;
            }

            .trainer-card .details {
                flex-direction: column;
                gap: 12px;
            }
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    SIDEBAR
    ============================================ -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-wrapper">
            <img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock">
            <span>GYM<span>ROCK</span></span>
        </div>

        <nav class="nav">
            <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="#" class="active"><i class="fas fa-users"></i> Entrenadores</a>
            <a href="suscriptores.html"><i class="fas fa-user-check"></i> Suscriptores</a>
            <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
            <a href="../index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
        </nav>
    </aside>

    <!-- ============================================
    MAIN
    ============================================ -->
    <main class="main">
        <!-- Header -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
                <div class="greeting">
                    <h1><i class="fas fa-users"></i> Entrenadores</h1>
                    <p>Gestión del equipo de entrenadores y certificaciones</p>
                </div>
            </div>
            <div class="user">
                <div class="avatar">GR</div>
                <div class="info">
                    GymRock
                    <small>Administrador</small>
                </div>
            </div>
        </div>

        <!-- Estadísticas -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="number" id="totalEntrenadores">6</div>
                <div class="label"><i class="fas fa-users"></i> Total Entrenadores</div>
            </div>
            <div class="stat-card">
                <div class="number" id="certificados">3</div>
                <div class="label"><i class="fas fa-certificate"></i> Certificados C.C.</div>
                <div class="badge-cert">🏅 Certificado de Confianza</div>
            </div>
            <div class="stat-card">
                <div class="number" id="nutriologos">1</div>
                <div class="label"><i class="fas fa-apple-alt"></i> Nutriólogos</div>
            </div>
            <div class="stat-card">
                <div class="number" id="disponibles">5</div>
                <div class="label"><i class="fas fa-check-circle"></i> Disponibles</div>
            </div>
        </div>

        <!-- Acciones -->
        <div class="top-actions">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-primary" onclick="agregarEntrenador()">
                    <i class="fas fa-plus"></i> Nuevo Entrenador
                </button>
                <button class="btn-secondary" onclick="aplicarTest()">
                    <i class="fas fa-clipboard-list"></i> Aplicar Test C.C.
                </button>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <i class="fas fa-filter" style="color: var(--text-gray);"></i>
                <select style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 12px; color: var(--text-white); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; cursor: pointer;">
                    <option value="todos">Todos</option>
                    <option value="certificados">Certificados</option>
                    <option value="sin-certificar">Sin certificar</option>
                    <option value="nutriologos">Nutriólogos</option>
                </select>
            </div>
        </div>

        <!-- Grid de Entrenadores -->
        <div class="trainers-grid" id="trainersGrid">
            <!-- Los datos se cargan con JavaScript -->
        </div>
    </main>

    <script>
        // ============================================
        // GYMROCK · ENTRENADORES SCRIPT
        // ============================================

        const API_URL = 'https://gymrock.onrender.com'

        // --- DATOS DE EJEMPLO (luego se conectará con la API) ---
        let entrenadores = [
            {
                id: 1,
                nombre: 'Carlos Rodríguez',
                especialidad: 'Entrenador',
                telefono: '+52 55 1234 5678',
                email: 'carlos.rodriguez@gymrock.com',
                certificado: true,
                puntaje: 92,
                disponible: true,
                fotoInicial: 'CR'
            },
            {
                id: 2,
                nombre: 'María Fernández',
                especialidad: 'Nutrióloga',
                telefono: '+52 55 8765 4321',
                email: 'maria.fernandez@gymrock.com',
                certificado: true,
                puntaje: 88,
                disponible: true,
                fotoInicial: 'MF'
            },
            {
                id: 3,
                nombre: 'Jorge Méndez',
                especialidad: 'Entrenador',
                telefono: '+52 55 2345 6789',
                email: 'jorge.mendez@gymrock.com',
                certificado: false,
                puntaje: null,
                disponible: true,
                fotoInicial: 'JM'
            },
            {
                id: 4,
                nombre: 'Ana Torres',
                especialidad: 'Ambos',
                telefono: '+52 55 3456 7890',
                email: 'ana.torres@gymrock.com',
                certificado: true,
                puntaje: 95,
                disponible: true,
                fotoInicial: 'AT'
            },
            {
                id: 5,
                nombre: 'Luis Ramírez',
                especialidad: 'Entrenador',
                telefono: '+52 55 4567 8901',
                email: 'luis.ramirez@gymrock.com',
                certificado: false,
                puntaje: null,
                disponible: false,
                fotoInicial: 'LR'
            },
            {
                id: 6,
                nombre: 'Patricia Gómez',
                especialidad: 'Nutrióloga',
                telefono: '+52 55 5678 9012',
                email: 'patricia.gomez@gymrock.com',
                certificado: false,
                puntaje: null,
                disponible: true,
                fotoInicial: 'PG'
            }
        ];

        // --- RENDERIZAR TARJETAS ---
        function renderizarEntrenadores() {
            const grid = document.getElementById('trainersGrid');
            
            // Actualizar estadísticas
            const total = entrenadores.length;
            const certificados = entrenadores.filter(e => e.certificado).length;
            const nutriologos = entrenadores.filter(e => e.especialidad === 'Nutrióloga' || e.especialidad === 'Ambos').length;
            const disponibles = entrenadores.filter(e => e.disponible).length;

            document.getElementById('totalEntrenadores').textContent = total;
            document.getElementById('certificados').textContent = certificados;
            document.getElementById('nutriologos').textContent = nutriologos;
            document.getElementById('disponibles').textContent = disponibles;

            if (entrenadores.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-gray);">
                        <i class="fas fa-users" style="font-size: 48px; opacity: 0.2; display: block; margin-bottom: 16px;"></i>
                        <p>No hay entrenadores registrados.</p>
                        <button class="btn-primary" style="margin-top: 12px;" onclick="agregarEntrenador()">
                            <i class="fas fa-plus"></i> Agregar primer entrenador
                        </button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = entrenadores.map(e => {
                const especialidadIcon = e.especialidad === 'Nutrióloga' ? 'fa-apple-alt' : 
                                        e.especialidad === 'Ambos' ? 'fa-star' : 'fa-dumbbell';
                const disponibilidad = e.disponible ? 
                    '<span style="color: var(--verde); font-size: 12px;"><i class="fas fa-circle"></i> Disponible</span>' : 
                    '<span style="color: var(--rojo); font-size: 12px;"><i class="fas fa-circle"></i> No disponible</span>';

                return `
                    <div class="trainer-card">
                        <div class="header-card">
                            <div class="avatar-card">${e.fotoInicial}</div>
                            <div class="info-card">
                                <h4>${e.nombre}</h4>
                                <div class="especialidad">
                                    <i class="fas ${especialidadIcon}"></i> ${e.especialidad}
                                </div>
                                ${e.certificado ? `<div class="cert-badge"><i class="fas fa-certificate"></i> Certificado C.C. ${e.puntaje}%</div>` : 
                                `<div class="cert-badge" style="background: rgba(220,38,38,0.08); color: var(--rojo); border-color: rgba(220,38,38,0.12);">
                                    <i class="fas fa-clock"></i> Pendiente de certificación
                                </div>`}
                            </div>
                        </div>
                        <div class="details">
                            <div class="contact">
                                <div><i class="fas fa-phone"></i> ${e.telefono}</div>
                                <div><i class="fas fa-envelope"></i> ${e.email}</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                ${disponibilidad}
                                <div class="actions">
                                    <button class="edit" onclick="editarEntrenador(${e.id})" title="Editar"><i class="fas fa-pen"></i></button>
                                    <button class="delete" onclick="eliminarEntrenador(${e.id})" title="Eliminar"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ACCIONES ---
        function agregarEntrenador() {
            alert('➕ Abrir formulario para nuevo entrenador\n(Conectar con API)');
        }

        function aplicarTest() {
            alert('📝 Aplicar Test de Certificación C.C.\n(Conectar con API)');
        }

        function editarEntrenador(id) {
            const e = entrenadores.find(ent => ent.id === id);
            alert(`✏️ Editar entrenador:\nNombre: ${e.nombre}\nEspecialidad: ${e.especialidad}\n(Conectar con API para edición)`);
        }

        function eliminarEntrenador(id) {
            if (confirm('¿Estás seguro de eliminar este entrenador?')) {
                entrenadores = entrenadores.filter(e => e.id !== id);
                renderizarEntrenadores();
            }
        }

        // --- TOGGLE SIDEBAR (móvil) ---
        document.getElementById('hamburgerBtn')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.getElementById('hamburgerBtn');
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        // --- FILTRO ---
        document.querySelector('.top-actions select')?.addEventListener('change', function() {
            const filtro = this.value;
            let filtrados = entrenadores;
            
            if (filtro === 'certificados') {
                filtrados = entrenadores.filter(e => e.certificado);
            } else if (filtro === 'sin-certificar') {
                filtrados = entrenadores.filter(e => !e.certificado);
            } else if (filtro === 'nutriologos') {
                filtrados = entrenadores.filter(e => e.especialidad === 'Nutrióloga' || e.especialidad === 'Ambos');
            }
            
            // Renderizar solo los filtrados temporalmente
            const grid = document.getElementById('trainersGrid');
            if (filtrados.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-gray);">
                    <i class="fas fa-search" style="font-size: 32px; opacity: 0.2; display: block; margin-bottom: 12px;"></i>
                    <p>No hay entrenadores con este filtro.</p>
                </div>`;
                return;
            }
            
            // Re-renderizar con el filtro aplicado
            const original = entrenadores;
            entrenadores = filtrados;
            renderizarEntrenadores();
            entrenadores = original; // Restaurar para futuras operaciones
        });

        // --- INICIAR ---
        document.addEventListener('DOMContentLoaded', function() {
            renderizarEntrenadores();
        });

        // Verificar token
        const token = localStorage.getItem('gymrock_token');
        if (!token) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
