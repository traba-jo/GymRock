<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#06060c;--card:#0f0f1a;--text:#e8e8f0;--sub:#8888a0;--pink:#f06595;--border:#181828}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px}
        .container{max-width:900px;margin:0 auto}
        h1{font-family:'Space Grotesk',sans-serif;font-size:32px;margin-bottom:8px}
        h1 span{color:var(--pink)}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:24px 0}
        .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center}
        .kpi .num{font-size:36px;font-weight:800}
        .kpi .lbl{font-size:12px;color:var(--sub);margin-top:4px}
        table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
        th{text-align:left;padding:12px;color:var(--sub);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
        td{padding:12px;border-bottom:1px solid var(--border)}
        .btn{display:inline-block;padding:10px 20px;background:var(--pink);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;text-decoration:none;margin-top:16px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Gym<span>Rock</span> Admin</h1>
        <p style="color:var(--sub)">Panel de administración</p>
        <div class="grid">
            <div class="kpi"><div class="num" id="gimnasios">--</div><div class="lbl">Gimnasios</div></div>
            <div class="kpi"><div class="num" id="usuarios">--</div><div class="lbl">Clientes</div></div>
        </div>
        <h3 style="margin-bottom:12px">Gimnasios Registrados</h3>
        <table><thead><tr><th>Nombre</th><th>Email</th><th>Plan</th><th>Licencia</th></tr></thead><tbody id="tabla"><tr><td colspan="4" style="text-align:center;color:var(--sub)">Cargando...</td></tr></tbody></table>
        <a href="#" class="btn" onclick="salir()">Cerrar sesión</a>
    </div>
    <script>
        if(!localStorage.getItem('adminToken')) location.href='login.html';
        async function cargar(){
            const t=localStorage.getItem('adminToken');
            const r=await fetch('/api/admin/dashboard?token='+t);
            const d=await r.json();
            if(d.status=='success'){
                document.getElementById('gimnasios').textContent=d.data.total_gimnasios||0;
                document.getElementById('usuarios').textContent=d.data.total_usuarios||0;
                const g=d.data.gimnasios||[];
                document.getElementById('tabla').innerHTML=g.length?g.map(x=>`<tr><td><strong>${x.nombre}</strong></td><td>${x.email}</td><td>${x.plan||'basico'}</td><td>${x.estado_licencia||'activa'}</td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:var(--sub)">Sin gimnasios</td></tr>';
            }
        }
        function salir(){localStorage.clear();location.href='../index.html'}
        cargar();
    </script>
</body>
</html>
