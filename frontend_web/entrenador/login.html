<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GymRock · Acceso Entrenador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#06060c;--card:#0f0f1a;--text:#e8e8f0;--sub:#8888a0;
            --green:#38d9a9;--blue:#4dabf7;--border:#181828;--gradient:linear-gradient(135deg,#38d9a9,#4dabf7);
        }
        [data-theme="light"] {
            --bg:#f8f9fc;--card:#ffffff;--text:#1a1a2e;--sub:#6b7280;
            --green:#12b886;--blue:#228be6;--border:#e5e7eb;--gradient:linear-gradient(135deg,#12b886,#228be6);
        }
        *{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s,color 0.2s}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        
        .container{width:100%;max-width:400px}
        .top-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:16px}
        .pill{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
        .pill-btn{padding:7px 12px;border:none;background:none;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif}
        .pill-btn.active{background:var(--gradient);color:#fff}
        .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}
        
        .logo{text-align:center;margin-bottom:28px}
        .logo img{max-width:130px;height:auto;filter:drop-shadow(0 0 20px rgba(56,217,169,0.2))}
        .logo .brand{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-top:4px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px 28px;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient)}
        .card .icon-circle{width:64px;height:64px;border-radius:50%;background:rgba(56,217,169,0.06);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;color:var(--green)}
        .card h2{font-family:'Space Grotesk',sans-serif;text-align:center;font-size:18px;margin-bottom:6px}
        .card p{text-align:center;color:var(--sub);font-size:13px;margin-bottom:22px}
        .field{margin-bottom:14px}
        .field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:4px;font-weight:600}
        .field input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;text-align:center;letter-spacing:3px;outline:none;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase}
        .field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(56,217,169,0.06)}
        .field input::placeholder{color:#3a3a45;letter-spacing:0;font-size:13px;font-family:'Inter',sans-serif;font-weight:400;text-transform:none}
        
        .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s;letter-spacing:0.3px}
        .btn-primary{background:var(--gradient);color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(56,217,169,0.2)}
        .msg{margin-top:10px;text-align:center;font-size:12px;display:none}
        .msg.error{display:block;color:#ff6b6b}
        .msg.success{display:block;color:var(--green)}
        
        .back{text-align:center;margin-top:18px}
        .back a{color:var(--sub);font-size:12px;text-decoration:none}
        .back a:hover{color:var(--text)}
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="pill">
                <button class="pill-btn active" onclick="setLang('es',this)">ES</button>
                <button class="pill-btn" onclick="setLang('en',this)">EN</button>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="logo">
            <img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock">
            <div class="brand">ENTRENADOR</div>
        </div>
        <div class="card">
            <div class="icon-circle"><i class="fas fa-graduation-cap"></i></div>
            <h2 data-es="Acceso Certificado" data-en="Certified Access">Acceso Certificado</h2>
            <p data-es="Ingresa el código de certificación que te proporcionó tu gimnasio" data-en="Enter the certification code provided by your gym">Ingresa el código de certificación que te proporcionó tu gimnasio</p>
            <div class="field">
                <label data-es="Código de Acceso" data-en="Access Code">Código de Acceso</label>
                <input type="text" id="codigo" placeholder="GYM-ENT-XXXXXX" maxlength="20" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="acceder()"><i class="fas fa-arrow-right"></i> <span data-es="Acceder al Panel" data-en="Access Panel">Acceder al Panel</span></button>
            <div class="msg" id="msg"></div>
        </div>
        <div class="back"><a href="../index.html">← <span data-es="Volver al inicio" data-en="Back to home">Volver al inicio</span></a></div>
    </div>
    <script>
        const API=window.location.origin;
        function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'))}
        (function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')})();
        function setLang(lang,btn){document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('[data-es][data-en]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));localStorage.setItem('lang',lang)}
        (function(){const l=localStorage.getItem('lang')||'es';const b=document.querySelector('.pill-btn[onclick*="'+l+'"]');if(b)setLang(l,b)})();
        
        async function acceder(){
            const codigo=document.getElementById('codigo').value.trim().toUpperCase();
            const msg=document.getElementById('msg');
            if(!codigo){msg.textContent='Ingresa el código';msg.className='msg error';return}
            msg.textContent='Verificando...';msg.className='msg success';
            try{
                const r=await fetch(API+'/api/entrenador/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codigo_acceso:codigo})});
                const d=await r.json();
                if(d.status==='success'){localStorage.setItem('entrenador_token',d.data.token);localStorage.setItem('entrenador_user',JSON.stringify(d.data));localStorage.setItem('entrenador_rol','entrenador');window.location.href='index.html'}
                else{msg.textContent='Código inválido o no autorizado';msg.className='msg error'}
            }catch(e){msg.textContent='Error de conexión';msg.className='msg error'}
        }
    </script>
</body>
</html>
