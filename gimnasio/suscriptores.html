<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymRock · Suscriptores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ============================================
           GYMROCK · SUSCRIPTORES (Azul/Rojo)
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0E1A;
            --bg-card: #111827;
            --bg-sidebar: #0F1524;
            --text-white: #E8EDF5;
            --text-gray: #94A3B8;
            --azul: #2563EB;
            --azul-oscuro: #1E3A8A;
            --azul-claro: #60A5FA;
            --rojo: #DC2626;
            --rojo-oscuro: #991B1B;
            --verde: #22C55E;
            --border-color: rgba(255, 255, 255, 0.05);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar .logo-wrapper img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .sidebar .logo-wrapper span {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-white);
        }

        .sidebar .logo-wrapper span span {
            color: var(--azul-claro);
        }

        .sidebar .nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sidebar .nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .sidebar .nav a i {
            width: 20px;
            font-size: 16px;
        }

        .sidebar .nav a:hover {
            background: rgba(37, 99, 235, 0.08);
            color: var(--text-white);
        }

        .sidebar .nav a.active {
            background: rgba(37, 99, 235, 0.12);
            color: var(--azul-claro);
            border-left: 3px solid var(--azul);
        }

        .sidebar .nav a.logout {
            margin-top: auto;
            color: var(--rojo);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .sidebar .nav a.logout:hover {
            background: rgba(220, 38, 38, 0.08);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            height: 100vh;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .greeting h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header .greeting p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .header .user {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            padding: 8px 16px 8px 12px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
        }

        .header .user .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--azul);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .header .user .info {
            font-size: 13px;
            font-weight: 500;
        }

        .header .user .info small {
            display: block;
            font-weight: 400;
            color: var(--text-gray);
            font-size: 11px;
        }

        /* --- CONTROLES --- */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .controls .search {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 14px;
            flex: 1;
            min-width: 200px;
            max-width: 360px;
        }

        .controls .search i {
            color: var(--text-gray);
            font-size: 14px;
        }

        .controls .search input {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
        }

        .controls .search input::placeholder {
            color: var(--text-gray);
        }

        .controls .filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls .filter select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .controls .filter select option {
            background: var(--bg-primary);
        }

        /* --- TABLA --- */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table thead {
            border-bottom: 1px solid var(--border-color);
        }

        table th {
            text-align: left;
            padding: 12px 8px;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        table tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(34, 197, 94, 0.12);
            color: var(--verde);
        }

        .status-badge.pending {
            background: rgba(251, 191, 36, 0.12);
            color: #FBBF24;
        }

        .status-badge.expired {
            background: rgba(220, 38, 38, 0.12);
            color: var(--rojo);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active {
            background: var(--verde);
        }
        .status-dot.pending {
            background: #FBBF24;
        }
        .status-dot.expired {
            background: var(--rojo);
        }

        .btn-action {
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
        }

        .btn-action.view:hover {
            color: var(--azul-claro);
        }

        .btn-action.edit:hover {
            color: #FBBF24;
        }

        /* --- PAGINACIÓN --- */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .pagination button {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 14px;
            color: var(--text-gray);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            border-color: var(--azul);
            color: var(--text-white);
        }

        .pagination button.active {
            background: var(--azul);
            border-color: var(--azul);
            color: white;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 16px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls .search {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header .greeting h1 {
                font-size: 20px;
            }

            .section {
                padding: 16px;
            }

            table {
                font-size: 12px;
            }

            table th, table td {
                padding: 8px 4px;
            }
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    SIDEBAR
    ============================================ -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-wrapper">
            <img src="https://i.ibb.co/kVLPrPZR/Photo-Room-20260712-151139.png" alt="GymRock">
            <span>GYM<span>ROCK</span></span>
        </div>

        <nav class="nav">
            <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="entrenadores.html"><i class="fas fa-users"></i> Entrenadores</a>
            <a href="#" class="active"><i class="fas fa-user-check"></i> Suscriptores</a>
            <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
            <a href="../index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
        </nav>
    </aside>

    <!-- ============================================
    MAIN
    ============================================ -->
    <main class="main">
        <!-- Header -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
                <div class="greeting">
                    <h1><i class="fas fa-user-check" style="color: var(--azul-claro);"></i> Suscriptores</h1>
                    <p>Gestión de miembros del gimnasio</p>
                </div>
            </div>
            <div class="user">
                <div class="avatar">GR</div>
                <div class="info">
                    GymRock
                    <small>Administrador</small>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="controls">
            <div class="search">
                <i class="fas fa-search"></i>
                <input type="text" id="buscarInput" placeholder="Buscar suscriptor...">
            </div>
            <div class="filter">
                <select id="filtroEstado">
                    <option value="todos">Todos los estados</option>
                    <option value="activo">Activos</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="vencido">Vencidos</option>
                </select>
            </div>
        </div>

        <!-- Tabla -->
        <div class="section">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Estado</th>
                            <th>Corte</th>
                            <th style="text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaSuscriptores">
                        <tr>
                            <td colspan="6" style="text-align: center; color: var(--text-gray);">Cargando suscriptores...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Paginación -->
            <div class="pagination">
                <button id="btnAnterior"><i class="fas fa-chevron-left"></i></button>
                <span id="paginaInfo" style="color: var(--text-gray); font-size: 13px;">Página 1 de 1</span>
                <button id="btnSiguiente"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // GYMROCK · SUSCRIPTORES SCRIPT
        // ============================================

        const API_URL = 'http://192.168.101.9:5000'; // 🔴 CAMBIA POR TU IP

        // --- DATOS DE EJEMPLO (luego se conectará con la API) ---
        let suscriptores = [
            { id: 1, nombre: 'Carlos López', email: 'carlos@email.com', plan: 'Mensual', estado: 'activo', corte: '2026-08-15' },
            { id: 2, nombre: 'Ana García', email: 'ana@email.com', plan: 'Quincenal', estado: 'activo', corte: '2026-07-20' },
            { id: 3, nombre: 'Miguel Torres', email: 'miguel@email.com', plan: 'Mensual', estado: 'pendiente', corte: '2026-07-18' },
            { id: 4, nombre: 'Laura Fernández', email: 'laura@email.com', plan: 'Mensual', estado: 'activo', corte: '2026-08-01' },
            { id: 5, nombre: 'Roberto Méndez', email: 'roberto@email.com', plan: 'Quincenal', estado: 'vencido', corte: '2026-07-10' },
            { id: 6, nombre: 'Sofía Ramírez', email: 'sofia@email.com', plan: 'Mensual', estado: 'activo', corte: '2026-08-10' },
            { id: 7, nombre: 'Diego Hernández', email: 'diego@email.com', plan: 'Mensual', estado: 'pendiente', corte: '2026-07-25' },
            { id: 8, nombre: 'Valentina Gómez', email: 'valentina@email.com', plan: 'Quincenal', estado: 'activo', corte: '2026-08-05' },
            { id: 9, nombre: 'Andrés Silva', email: 'andres@email.com', plan: 'Mensual', estado: 'vencido', corte: '2026-06-30' },
            { id: 10, nombre: 'Mariana Castro', email: 'mariana@email.com', plan: 'Mensual', estado: 'activo', corte: '2026-08-12' },
            { id: 11, nombre: 'Javier Ortiz', email: 'javier@email.com', plan: 'Quincenal', estado: 'activo', corte: '2026-08-08' },
            { id: 12, nombre: 'Carmen Vega', email: 'carmen@email.com', plan: 'Mensual', estado: 'pendiente', corte: '2026-07-28' },
        ];

        let paginaActual = 1;
        const porPagina = 5;
        let filtroActual = 'todos';
        let busquedaActual = '';

        // --- RENDERIZAR TABLA ---
        function renderizarTabla() {
            const tbody = document.getElementById('tablaSuscriptores');
            
            // Filtrar
            let filtrados = suscriptores;
            
            if (filtroActual !== 'todos') {
                filtrados = filtrados.filter(s => s.estado === filtroActual);
            }
            
            if (busquedaActual.trim() !== '') {
                const busq = busquedaActual.toLowerCase().trim();
                filtrados = filtrados.filter(s => 
                    s.nombre.toLowerCase().includes(busq) || 
                    s.email.toLowerCase().includes(busq)
                );
            }

            // Paginar
            const total = filtrados.length;
            const totalPaginas = Math.ceil(total / porPagina) || 1;
            if (paginaActual > totalPaginas) paginaActual = totalPaginas;
            if (paginaActual < 1) paginaActual = 1;
            
            const inicio = (paginaActual - 1) * porPagina;
            const fin = inicio + porPagina;
            const paginados = filtrados.slice(inicio, fin);

            // Actualizar info de paginación
            document.getElementById('paginaInfo').textContent = `Página ${paginaActual} de ${totalPaginas}`;
            document.getElementById('btnAnterior').disabled = paginaActual <= 1;
            document.getElementById('btnSiguiente').disabled = paginaActual >= totalPaginas;

            if (paginados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-gray);">No hay suscriptores que coincidan con los filtros.</td></tr>`;
                return;
            }

            tbody.innerHTML = paginados.map(s => {
                const estadoMap = {
                    'activo': { clase: 'active', texto: 'Activo' },
                    'pendiente': { clase: 'pending', texto: 'Pendiente' },
                    'vencido': { clase: 'expired', texto: 'Vencido' }
                };
                const est = estadoMap[s.estado] || estadoMap['activo'];
                const fechaCorte = new Date(s.corte).toLocaleDateString('es-ES');

                return `
                    <tr>
                        <td><strong>${s.nombre}</strong></td>
                        <td>${s.email}</td>
                        <td>${s.plan}</td>
                        <td><span class="status-badge ${est.clase}"><span class="status-dot ${est.clase}"></span> ${est.texto}</span></td>
                        <td>${fechaCorte}</td>
                        <td style="text-align: center;">
                            <button class="btn-action view" onclick="verSuscriptor(${s.id})" title="Ver"><i class="fas fa-eye"></i></button>
                            <button class="btn-action edit" onclick="editarSuscriptor(${s.id})" title="Editar"><i class="fas fa-pen"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // --- ACCIONES ---
        function verSuscriptor(id) {
            alert('📋 Ver suscriptor ID: ' + id + '\n(Conectar con API para detalles)');
        }

        function editarSuscriptor(id) {
            alert('✏️ Editar suscriptor ID: ' + id + '\n(Conectar con API para edición)');
        }

        // --- EVENTOS ---
        document.getElementById('buscarInput').addEventListener('input', function() {
            busquedaActual = this.value;
            paginaActual = 1;
            renderizarTabla();
        });

        document.getElementById('filtroEstado').addEventListener('change', function() {
            filtroActual = this.value;
            paginaActual = 1;
            renderizarTabla();
        });

        document.getElementById('btnAnterior').addEventListener('click', function() {
            if (paginaActual > 1) {
                paginaActual--;
                renderizarTabla();
            }
        });

        document.getElementById('btnSiguiente').addEventListener('click', function() {
            const filtrados = obtenerFiltrados();
            const totalPaginas = Math.ceil(filtrados.length / porPagina) || 1;
            if (paginaActual < totalPaginas) {
                paginaActual++;
                renderizarTabla();
            }
        });

        function obtenerFiltrados() {
            let filtrados = suscriptores;
            if (filtroActual !== 'todos') {
                filtrados = filtrados.filter(s => s.estado === filtroActual);
            }
            if (busquedaActual.trim() !== '') {
                const busq = busquedaActual.toLowerCase().trim();
                filtrados = filtrados.filter(s => 
                    s.nombre.toLowerCase().includes(busq) || 
                    s.email.toLowerCase().includes(busq)
                );
            }
            return filtrados;
        }

        // --- TOGGLE SIDEBAR (móvil) ---
        document.getElementById('hamburgerBtn')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.getElementById('hamburgerBtn');
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        // --- INICIAR ---
        document.addEventListener('DOMContentLoaded', function() {
            renderizarTabla();
        });

        // Verificar token
        const token = localStorage.getItem('gymrock_token');
        if (!token) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
